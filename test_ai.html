<!DOCTYPE html>
<html lang="ru"><head>
<style>html,body{background:#0a0a0f;margin:0;}</style>
<script>try{var _t=localStorage.getItem('focus_theme')||'original';document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест ИИ</title>
<style>
body{font-family:-apple-system,sans-serif;background:#131319;color:#e8e8ee;padding:16px;font-size:15px;}
button{background:linear-gradient(135deg,#FFD966,#7C8CFF);color:#0a0a0f;border:none;padding:16px;border-radius:12px;font-size:16px;font-weight:700;width:100%;margin:8px 0;}
.r{background:rgba(0,0,0,0.4);border:1px solid #7C8CFF;border-radius:12px;padding:14px;margin-top:12px;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.5;}
.ok{border-color:#78DC96;color:#9dffbf;}.err{border-color:#ff6b6b;color:#ff9b9b;}
</style></head><body>
<h2>🔬 Тест ИИ (v2)</h2>
<p style="font-size:13px;color:#9a9aab;">Открой ЭТУ страницу на том же устройстве где приложение. Жми кнопки по очереди.</p>
<button onclick="t1()">1. Воркер БЕЗ слэша (GET)</button>
<button onclick="t2()">2. Воркер СО слэшем (GET)</button>
<button onclick="t3()">3. POST запрос к ИИ</button>
<div id="out" class="r">Жди результат...</div>
<script>
const A='https://focus-ai.playing-life-rama.workers.dev';
const o=document.getElementById('out');
async function t1(){o.className='r';o.textContent='Проверяю '+A+' ...';
 try{const r=await fetch(A);const t=await r.text();o.className='r ok';o.textContent='✓ Ответ ('+r.status+'):\n'+t;}
 catch(e){o.className='r err';o.textContent='✗ '+e.name+': '+e.message;}}
async function t2(){o.className='r';o.textContent='Проверяю '+A+'/ ...';
 try{const r=await fetch(A+'/');const t=await r.text();o.className='r ok';o.textContent='✓ Ответ ('+r.status+'):\n'+t;}
 catch(e){o.className='r err';o.textContent='✗ '+e.name+': '+e.message;}}
async function t3(){o.className='r';o.textContent='POST к ИИ...';
 try{const r=await fetch(A,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:'привет'}]})});
 const t=await r.text();o.className='r ok';o.textContent='Статус '+r.status+':\n'+t;}
 catch(e){o.className='r err';o.textContent='✗ '+e.name+': '+e.message+'\n\nПолная ошибка: '+e.toString();}}
</script></body></html>
