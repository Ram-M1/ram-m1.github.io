/* PWA-режим (установлено на телефон): на весь реальный экран, без макетной рамки */
@media (display-mode: standalone), (display-mode: fullscreen) {
    html, body { background: var(--bg-1, #0d0d12) !important; padding: 0 !important; overflow: hidden !important; }
    .phone {
        width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding-top: env(safe-area-inset-top) !important;
        padding-bottom: env(safe-area-inset-bottom) !important;
        max-width: 100vw !important;
    }
    .phone::before, .phone::after { display: none !important; }
    #atmosCanvas, #cosmicCanvas, #medCanvas, #atmos, .atmos-canvas { border-radius: 0 !important; }
    .modal, .slideshow, .session-area { border-radius: 0 !important; }
    #atmosCanvas, #cosmicCanvas, #medCanvas, .atmos-canvas, canvas#atmos {
        width: 100vw !important; height: 100vh !important; height: 100dvh !important;
        position: absolute !important; inset: 0 !important;
    }
}

/* Телефоны: приложение на весь экран без макетной рамки (надёжно, не зависит от PWA-режима) */
@media (max-width: 600px) {
    * { -webkit-user-select: none !important; user-select: none !important; -webkit-tap-highlight-color: transparent !important; }
    input, textarea { -webkit-user-select: text !important; user-select: text !important; }
    html, body { background: var(--bg-1, #0d0d12) !important; padding: 0 !important; margin: 0 !important; overflow: hidden !important; height: 100vh; height: 100dvh; display: block !important; }
    body { display: flex !important; align-items: stretch !important; justify-content: flex-start !important; }
    .phone {
        width: 100vw !important;
        max-width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
    }
    .phone::before, .phone::after { display: none !important; }
    /* анимация/фон идут до самого верха под чёлку */
    #atmosCanvas, #cosmicCanvas, #medCanvas, .atmos-canvas, canvas#atmos {
        width: 100vw !important; height: 100vh !important; height: 100dvh !important;
        position: absolute !important; inset: 0 !important; border-radius: 0 !important;
    }
    /* safe-area отступ даём контенту, а не фону — чтобы не было чёрной полосы */
    .screen, .session-area, .slideshow {
        padding-top: calc(env(safe-area-inset-top) + 8px) !important;
    }
    .modal, .slideshow, .session-area { border-radius: 0 !important; }
}

<script src="focus-core.js"></script>
<script>
    // возврат из переписки: в список чатов (а оттуда кнопкой — на главную)
    function chatGoBack(){
        location.href = 'fokus_chats.html';
    }
    if (typeof FocusStorage === 'undefined') {
        window.FocusStorage = {
            _key:'focus_user',
            getUser(){ try { return JSON.parse(localStorage.getItem(this._key)) || {}; } catch(e){ return {}; } },
            saveUser(p){ const c=this.getUser(); const m={...c,...p}; localStorage.setItem(this._key, JSON.stringify(m)); return m; },
            getTheme(){ return this.getUser().theme || 'original'; },
            setTheme(id){ this.saveUser({ theme:id }); },
            addCoins(n){ const u=this.getUser(); u.coins=(u.coins||0)+n; this.saveUser(u); return u.coins; },
            spendCoins(n){ const u=this.getUser(); u.coins=Math.max(0,(u.coins||0)-n); this.saveUser(u); return u.coins; }
        };
    }
    if (typeof FocusCore === 'undefined') {
        window.FocusCore = {
            applyStoredTheme(){ (document.getElementById('htmlRoot')||document.documentElement).setAttribute('data-theme', FocusStorage.getTheme()); },
initAtmosphere(canvasId) {
                // Движок фона централизован в focus-core.js. Заглушка-фолбэк.
                var ac = document.getElementById(canvasId || 'atmosCanvas');
                if (ac && ac.getContext) { ac.width = 375; ac.height = 700; }
            }        };
    }

    FocusCore.applyStoredTheme();
    FocusCore.initAtmosphere('atmosCanvas');

    function toast(msg){
        const t=document.getElementById('toast');
        t.innerText=msg; t.classList.add('show');
        clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'), 2000);
    }
    function escapeHtml(s){ const d=document.createElement('div'); d.innerText=String(s==null?'':s); return d.innerHTML; }
    function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

    const params = new URLSearchParams(location.search);
    const chatId = params.get('id') || 'c1';
    // Реальный чат через Firebase (если пришли с chatId в URL)
    const realChatId = params.get('chatId');
    const realChatName = params.get('name') || 'Пользователь';
    const isRealChat = !!realChatId;

    const CHATS_KEY = 'focus_chats';
    function getChats(){ try { return JSON.parse(localStorage.getItem(CHATS_KEY))||[]; } catch(e){ return []; } }
    function saveChats(c){ localStorage.setItem(CHATS_KEY, JSON.stringify(c)); }
    const chat = getChats().find(c => c.id === chatId) || { id:chatId, name:'Чат', type:'user', avatar:'?', online:false };

    // сообщения чата
    const MSG_KEY = 'focus_chat_msgs_' + chatId;
    function getMsgs(){ try { return JSON.parse(localStorage.getItem(MSG_KEY))||[]; } catch(e){ return []; } }
    function saveMsgs(m){ localStorage.setItem(MSG_KEY, JSON.stringify(m)); }

    // шапка
    const initial = (chat.avatar || chat.name[0] || '?').toUpperCase();
    const hdrAv = document.getElementById('hdrAvatar');
    if (chat.photo && chat.photo.startsWith('data:image')) {
        hdrAv.innerHTML = '<img src="' + chat.photo + '" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">';
    } else {
        hdrAv.innerText = initial;
    }
    if (chat.type === 'oracle') hdrAv.className = 'chat-hdr-avatar oracle';
    document.getElementById('hdrName').innerText = chat.name;
    const st = document.getElementById('hdrStatus');
    if (chat.online) { st.innerText = 'в сети'; st.className = 'chat-hdr-status'; }
    else { st.innerText = 'был(а) недавно'; st.className = 'chat-hdr-status offline'; }

    // демо-сообщения при первом заходе
    function seedMsgs(){
        let msgs = getMsgs();
        if (msgs.length === 0) {
            if (chat.type === 'oracle') {
                msgs = [
                    { from:'them', text:'Здравствуйте! Я получила вашу заявку на расклад. Готова приступить.', time:'14:20' },
                    { from:'them', text:'Расскажите, какой вопрос вас беспокоит?', time:'14:21' }
                ];
            } else if (chat.type === 'system') {
                msgs = [
                    { from:'them', text:'Добро пожаловать в FOCUS! 🎯', time:'10:00' },
                    { from:'them', text:'Здесь ты можешь общаться с друзьями и оракулами. Удачи в развитии!', time:'10:00' }
                ];
            } else {
                msgs = [ { from:'them', text:'Привет! Как дела с дисциплиной? 💪', time:'12:00' } ];
            }
            saveMsgs(msgs);
        }
        return msgs;
    }

    function renderMsgs(){
        const area = document.getElementById('messagesArea');
        const msgs = seedMsgs();
        area.innerHTML = '';
        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = 'msg ' + (m.from === 'me' ? 'me' : 'them');
            let inner = '';
            if (m.img) inner += `<img src="${m.img}" class="msg-img">`;
            if (m.doc) inner += `<div class="msg-doc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg><span class="msg-doc-name">${escapeHtml(m.doc)}</span></div>`;
            if (m.coin) inner += `<div class="msg-coin"><div class="msg-coin-icon">💰</div><div><div class="msg-coin-text">${m.coin} F-coin</div><div class="msg-coin-sub">${m.from==='me'?'Ты перевёл':'Перевод тебе'}</div></div></div>`;
            if (m.voice) {
                const dur = m.dur || 1;
                const mm = String(Math.floor(dur/60)).padStart(1,'0'), ss = String(dur%60).padStart(2,'0');
                let bars = '';
                for (let i=0;i<14;i++) bars += '<span style="height:'+(5+Math.round(Math.random()*16))+'px"></span>';
                inner += `<div class="msg-voice"><div class="msg-voice-play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div><div class="msg-voice-wave">${bars}</div><div class="msg-voice-time">${mm}:${ss}</div></div>`;
            }
            if (m.text) inner += escapeHtml(m.text);
            inner += `<div class="msg-time">${m.time||''}</div>`;
            div.innerHTML = inner;
            area.appendChild(div);
        });
        area.scrollTop = area.scrollHeight;
    }

    function addMsg(msg){
        const msgs = getMsgs();
        msgs.push(msg);
        saveMsgs(msgs);
        // обновим последнее в списке чатов
        const chats = getChats();
        const ch = chats.find(c => c.id === chatId);
        if (ch) {
            ch.last = msg.text || (msg.img ? '📷 Фото' : (msg.doc ? '📎 Документ' : (msg.coin ? '💰 Перевод '+msg.coin+' F-coin' : (msg.voice ? '🎤 Голосовое сообщение' : ''))));
            ch.time = msg.time;
            saveChats(chats);
        }
        renderMsgs();
    }

    // отправка текста
    const input = document.getElementById('chatInput');
    function sendText(){
        const text = input.value.trim();
        if (!text) return;
        if (isRealChat && window.fbSendMessage) {
            // реальный чат — шлём в облако (отобразится через реалтайм-подписку)
            window.fbSendMessage(realChatId, text).then(function(r){
                if (!r || !r.ok) toast('Сообщение не отправилось. Проверь связь');
            }).catch(function(){ toast('Сообщение не отправилось. Проверь связь'); });
            input.value = '';
            input.style.height = 'auto';
            sendBtnEl.style.display = 'none'; voiceBtnEl.style.display = 'flex';
            return;
        }
        addMsg({ from:'me', text, time:nowTime() });
        input.value = '';
        input.style.height = 'auto';
    }
    const sendBtnEl = document.getElementById('sendMsgBtn');
    const voiceBtnEl = document.getElementById('voiceMsgBtn');
    document.getElementById('sendMsgBtn').addEventListener('click', sendText);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    });
    // переключение микрофон/отправка + авто-высота textarea
    const voiceBtn = document.getElementById('voiceMsgBtn');
    const sendBtn = document.getElementById('sendMsgBtn');
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(90, input.scrollHeight) + 'px';
        const hasText = input.value.trim().length > 0;
        sendBtn.style.display = hasText ? 'flex' : 'none';
        voiceBtn.style.display = hasText ? 'none' : 'flex';
    });
    // голосовой ввод в чате: зажал — говоришь, отпустил — распозналось в текст
    const SR_CHAT = window.SpeechRecognition || window.webkitSpeechRecognition;
    let chatRecog = null, chatListening = false, chatVoiceText = '';
    function startRec(){
        if (!SR_CHAT) { toast('Голосовой ввод не поддерживается браузером'); return; }
        if (chatListening) return;
        chatVoiceText = '';
        chatRecog = new SR_CHAT();
        chatRecog.lang = 'ru-RU';
        chatRecog.interimResults = true;
        chatRecog.continuous = true;
        chatRecog.maxAlternatives = 1;
        chatRecog.onstart = () => {
            chatListening = true;
            voiceBtn.classList.add('recording');
            const sub = document.querySelector('.chat-hdr-status');
            if (sub) { sub.dataset.prev = sub.innerText; sub.innerText = '🔴 Говори...'; }
        };
        chatRecog.onend = () => {
            chatListening = false;
            voiceBtn.classList.remove('recording');
            const sub = document.querySelector('.chat-hdr-status');
            if (sub && sub.dataset.prev) sub.innerText = sub.dataset.prev;
            // распознанный текст вставляем в поле (не отправляем сразу — юзер проверит и нажмёт отправить)
            if (chatVoiceText.trim()) {
                input.value = (input.value ? input.value + ' ' : '') + chatVoiceText.trim();
                input.dispatchEvent(new Event('input')); // покажет кнопку отправить
                input.focus();
            }
        };
        chatRecog.onerror = (e) => {
            chatListening = false; voiceBtn.classList.remove('recording');
            const sub = document.querySelector('.chat-hdr-status');
            if (sub && sub.dataset.prev) sub.innerText = sub.dataset.prev;
            if (e.error === 'not-allowed') toast('Разреши доступ к микрофону');
        };
        chatRecog.onresult = (e) => {
            let txt = '';
            for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
            chatVoiceText = txt;
        };
        try { chatRecog.start(); } catch(er){}
    }
    function stopRec(){

    // зажатие (тач + мышь): держишь — говоришь, отпустил — текст в поле

    // меню вложений

    // выбранное вложение (ждёт отправки)
    let pendingAttach = null; // { kind:'photo'|'file', data, fileName?, fileSize? }
    const attachPreview = document.getElementById('attachPreview');

    function showAttachPreview(){

        if (!pendingAttach) return;

            c.innerHTML = '<img src="'+pendingAttach.data+'">';

    // фото → сжатие → предпросмотр (НЕ отправляем сразу)
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            const img = new Image();
            img.onload = () => {
                // ЛИМИТ: одно сообщение не может весить больше ~1 МБ (ограничение базы).
                // Поэтому ужимаем фото ПОКА не влезет — иначе отправка молча проваливалась.
                const LIMIT = 820 * 1024;   // запас под остальные поля сообщения
                function render(max, q) {
                    const sc = Math.min(1, max / Math.max(img.width, img.height));
                    const cv = document.createElement('canvas');
                    cv.width = Math.round(img.width * sc);
                    cv.height = Math.round(img.height * sc);
                    const cx = cv.getContext('2d');
                    cx.imageSmoothingEnabled = true; cx.imageSmoothingQuality = 'high';
                    cx.drawImage(img, 0, 0, cv.width, cv.height);
                    return cv.toDataURL('image/jpeg', q);
                }
                let data = render(1280, 0.82);
                const steps = [[1024, 0.75], [860, 0.68], [720, 0.6], [600, 0.5]];
                for (let i = 0; i < steps.length && data.length > LIMIT; i++) {
                    data = render(steps[i][0], steps[i][1]);
                }
                if (data.length > LIMIT) {
                    toast('Фото слишком тяжёлое даже после сжатия. Попробуй другое');
                    return;
                }

                // МИНИАТЮРА (несколько КБ) — она лежит прямо в сообщении и видна МГНОВЕННО.
                // Полное фото хранится отдельно и грузится только по тапу.
                var thumb = '';
                try { thumb = render(180, 0.45); } catch(e){}
                if (thumb.length > 20000) { try { thumb = render(120, 0.35); } catch(e){} }

                pendingAttach = { kind:'photo', data: data, thumb: thumb, text:'' };
                showAttachPreview();
            };
            img.src = reader.result;
        };
        reader.readAsDataURL(file);
        e.target.value = '';
        document.getElementById('attachMenu').classList.remove('show');
    });
    // документ/файл → предпросмотр (НЕ отправляем сразу)
    document.getElementById('docInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // Файл кодируется в текст и раздувается примерно на треть.
        // Лимит сообщения ~1 МБ, поэтому исходный файл должен быть до ~700 КБ,
        // иначе отправка падала МОЛЧА (раньше стоял лимит 900 КБ — он не спасал).
        if (file.size > 700*1024) {
            toast('Файл до 700 КБ. Этот — ' + Math.round(file.size/1024) + ' КБ. Сожми или пришли ссылкой');
            e.target.value = ''; return;
        }
        const reader = new FileReader();
        reader.onload = () => {
            pendingAttach = { kind:'file', data: reader.result, fileName: file.name, fileSize: Math.round(file.size/1024)+' КБ', text:'' };
            showAttachPreview();
        };
        reader.readAsDataURL(file);
        e.target.value = '';
        document.getElementById('attachMenu').classList.remove('show');
    });

    // ===== Реальный чат: заголовок + реалтайм-подписка =====
    if (isRealChat) {
        // шапка на реального собеседника
        document.getElementById('hdrName').innerText = realChatName;
        document.getElementById('hdrAvatar').innerText = (realChatName[0]||'?').toUpperCase();
        const st = document.getElementById('hdrStatus');
        if (st) { st.innerText = 'FOCUS чат'; st.className = 'chat-hdr-status'; }

        // получаем uid собеседника из chatId (формат uid1__uid2)
        let otherUid = null;
        const myUidNow = () => (window.fbCurrentUser && window.fbCurrentUser()) ? window.fbCurrentUser().uid : null;

        // показываем кнопку "в контакты"
        const addContactBtn = document.getElementById('addContactBtn');
        addContactBtn.style.display = 'flex';

        function resolveOther(){
            const my = myUidNow();
            if (!my) return null;
            const parts = realChatId.split('__');
            otherUid = parts.find(p => p !== my) || parts[0];
            return otherUid;
        }

        // рендер одного сообщения (все типы)
        function renderMsg(m, mine){
            const wrap = document.createElement('div');
            wrap.style.display = 'flex';
            wrap.style.flexDirection = 'column';
            const t = m.at ? new Date(m.at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) : '';
            const chatId = new URLSearchParams(location.search).get('chatId');
            let inner = '';

            if (m.kind === 'photo' && (m.thumb || m.data)) {
                /* Показываем МИНИАТЮРУ (несколько КБ) — она приходит вместе с сообщением.
                   Полное фото весит сотни КБ и грузится ТОЛЬКО по тапу (раньше все фото
                   скачивались при каждом открытии чата — отсюда тормоза). */
                const src = m.thumb || m.data;
                inner = `<div class="msg ${mine?'me':'them'}"><img class="msg-img" data-full="${m.mediaId||''}" src="${src}">${m.text?'<div>'+escapeHtml(m.text)+'</div>':''}<span class="msg-time">${t}</span></div>`;

            } else if (m.kind === 'file' && (m.mediaId || m.data)) {
                inner = `<div class="msg ${mine?'me':'them'}"><div class="msg-doc" data-file="${m.mediaId||''}" data-name="${escapeHtml(m.fileName||'файл')}" style="cursor:pointer;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg><div><div class="msg-doc-name">${escapeHtml(m.fileName||'Файл')}</div><div style="font-size:10px;opacity:0.7;">${escapeHtml(m.fileSize||'')}</div></div></div><span class="msg-time">${t}</span></div>`;

            } else if (m.kind === 'coins') {
                inner = `<div class="msg-coins">💰 ${mine?'Ты перевёл':'Тебе перевели'} ${m.amount} F-coin<span class="msg-time" style="display:block;color:#a88;">${t}</span></div>`;
            } else if (m.kind === 'program') {
                /* ПРОГРАММА В ЧАТЕ. Раньше код кидали простынёй текста и копировали руками.
                   Теперь карточка с кнопкой: тап → импорт с уже вставленным кодом. */
                const _pn = escapeHtml(m.progName || 'Программа');
                const _pp = parseInt(m.progPrice, 10) || 0;
                inner = `<div class="msg ${mine?'me':'them'}" style="max-width:84%;">
                    <div style="font-size:19px;">🏋️</div>
                    <div style="font-weight:700;margin:2px 0 3px;">${_pn}</div>
                    <div style="font-size:11.5px;opacity:0.8;">${_pp > 0 ? _pp + ' F-coin + комиссия' : 'Бесплатно · комиссия 150 F-coin'}</div>
                    ${mine ? '<div style="font-size:11px;opacity:0.7;margin-top:6px;">Отправлено</div>'
                           : `<div class="prog-take" data-code="${escapeHtml(m.progCode||'')}" style="margin-top:8px;padding:9px 14px;border-radius:11px;background:linear-gradient(135deg,#FFD966,#7C8CFF);color:#0a0a0f;font-size:12.5px;font-weight:700;text-align:center;cursor:pointer;">Добавить себе</div>`}
                    <span class="msg-time" style="display:block;">${t}</span>
                </div>`;
            } else {
                inner = `<div class="msg ${mine?'me':'them'}">${escapeHtml(m.text)}<span class="msg-time">${t}</span></div>`;
            }
            wrap.innerHTML = inner;

            // ── тап по «Добавить себе» у программы: открываем импорт с готовым кодом ──
            const takeBtn = wrap.querySelector('.prog-take');
            if (takeBtn) {
                takeBtn.addEventListener('click', function(){
                    try { localStorage.setItem('focus_pending_program', this.dataset.code || ''); } catch(e){}
                    location.href = 'fokus_workout_program.html';
                });
            }

            // ── тап по фото: подгружаем полное и открываем просмотрщик ──
            const img = wrap.querySelector('.msg-img');
            if (img) {
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', async function(){
                    let full = m.data || null;                       // старые сообщения: фото уже внутри
                    if (!full && m.mediaId && window.fbGetMedia) {
                        img.style.opacity = '0.55';
                        const r = await window.fbGetMedia(chatId, m.mediaId);
                        img.style.opacity = '1';
                        if (!r.ok) { toast('Не удалось загрузить фото'); return; }
                        full = r.data;
                    }
                    if (full) openPhotoViewer(full);
                });
            }

            // ── тап по файлу: подгружаем и скачиваем ──
            const fileEl = wrap.querySelector('.msg-doc');
            if (fileEl) {
                fileEl.addEventListener('click', async function(){
                    let full = m.data || null;
                    if (!full && m.mediaId && window.fbGetMedia) {
                        fileEl.style.opacity = '0.55';
                        const r = await window.fbGetMedia(chatId, m.mediaId);
                        fileEl.style.opacity = '1';
                        if (!r.ok) { toast('Не удалось загрузить файл'); return; }
                        full = r.data;
                    }
                    if (!full) return;
                    try {
                        const a = document.createElement('a');
                        a.href = full;
                        a.download = m.fileName || 'файл';
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                    } catch(e) { toast('Не удалось скачать'); }
                });
            }

            return wrap;
        }

        /* ПРОСМОТРЩИК ФОТО внутри приложения.
           Раньше фото открывалось в новой вкладке — на iPhone это часто блокируется
           и юзер вообще не мог посмотреть картинку. */
        function openPhotoViewer(src){
            const ov = document.createElement('div');
            ov.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.95);' +
                'display:flex;align-items:center;justify-content:center;padding:16px;' +
                'padding-top:calc(16px + env(safe-area-inset-top,0px));';
            const im = document.createElement('img');
            im.src = src;
            im.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;border-radius:10px;';
            const close = document.createElement('div');
            close.textContent = '✕';
            close.style.cssText = 'position:absolute;top:calc(14px + env(safe-area-inset-top,0px));right:18px;' +
                'width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.14);color:#fff;' +
                'display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;';
            ov.appendChild(im);
            ov.appendChild(close);
            ov.addEventListener('click', function(){ ov.remove(); });
            document.body.appendChild(ov);
        }

        function startRealChat(){
            const area = document.getElementById('messagesArea');
            const myUid = myUidNow();
            const cacheKey = 'focus_chat_msgs_' + realChatId;

            // 1. МГНОВЕННО показываем кэшированные сообщения (без ожидания облака)
            try {
                const cached = JSON.parse(localStorage.getItem(cacheKey));
                if (cached && cached.length) {
                    // Помечаем показанные — тогда, когда придут данные из облака,
                    // список НЕ перерисуется заново: допишутся только новые сообщения.
                    window.__shownIds = new Set();
                    const frag = document.createDocumentFragment();
                    cached.forEach(function(m){
                        window.__shownIds.add(m.id);
                        frag.appendChild(renderMsg(m, m.from === myUid));
                    });
                    area.innerHTML = '';
                    area.appendChild(frag);
                    area.dataset.inited = '1';
                    area.scrollTop = area.scrollHeight;
                    if (window.__chatSetOldest && cached[0]) window.__chatSetOldest(cached[0]._ts);
                }
            } catch(e){}

            // 2. подключаем реалтайм из облака (обновит когда придёт)
            if (!window.fbListenMessages || !myUidNow()) { setTimeout(startRealChat, 300); return; }
            resolveOther();
            window.fbListenMessages(realChatId, (msgs) => {
                if (!msgs.length) {
                    if (!area.querySelector('.msg')) area.innerHTML = '<div style="text-align:center;color:#8e8e9e;font-size:12px;padding:30px 20px;">Начни переписку — напиши первое сообщение 👋</div>';
                    return;
                }
                const uid = myUidNow();

                /* ДОПИСЫВАЕМ НОВОЕ, А НЕ ПЕРЕРИСОВЫВАЕМ ВСЁ.
                   Раньше на каждое обновление весь список сообщений СТИРАЛСЯ и рисовался
                   заново — отсюда мелькание, рывки и тормоза в длинной переписке
                   (50 сообщений с картинками = 50 узлов DOM заново каждый раз).
                   Теперь на экране остаётся то, что уже нарисовано, а новое просто
                   добавляется в конец — как в WhatsApp и MAX. */
                if (!window.__shownIds) window.__shownIds = new Set();
                var shown = window.__shownIds;

                // первый показ (или чат переоткрыли) — рисуем разом
                if (!area.dataset.inited) {
                    const frag = document.createDocumentFragment();
                    msgs.forEach(function(m){
                        frag.appendChild(renderMsg(m, m.from === uid));
                        shown.add(m.id);
                    });
                    area.innerHTML = '';
                    area.appendChild(frag);
                    area.dataset.inited = '1';
                    area.scrollTop = area.scrollHeight;
                } else {
                    // дальше — только НОВЫЕ сообщения
                    var atBottom = (area.scrollHeight - area.scrollTop - area.clientHeight) < 120;
                    var added = 0;
                    msgs.forEach(function(m){
                        if (shown.has(m.id)) return;
                        shown.add(m.id);
                        area.appendChild(renderMsg(m, m.from === uid));
                        added++;
                    });
                    // экран не дёргаем, если юзер читает старое
                    if (added && atBottom) area.scrollTop = area.scrollHeight;
                }
                if (window.__chatSetOldest && msgs[0]) window.__chatSetOldest(msgs[0]._ts);
                // кэшируем последние 50 для мгновенного показа в след. раз
                // В КЭШ — БЕЗ ТЯЖЁЛОГО. Раньше сюда падали фото целиком (base64),
                // и память телефона (лимит 5 МБ) переполнялась — приложение начинало молча ломаться.
                // Миниатюру оставляем: она крошечная и даёт мгновенный показ при открытии чата.
                try {
                    const light = msgs.slice(-50).map(function(x){
                        const c = Object.assign({}, x);
                        delete c.data;           // полное фото/файл в кэше не держим
                        return c;
                    });
                    localStorage.setItem(cacheKey, JSON.stringify(light));
                } catch(e){
                    try { localStorage.removeItem(cacheKey); } catch(_){}   // переполнено — чистим, не ломаемся
                }
            });
        }
        if (window.FB_AUTH_READY) startRealChat();
        else { startRealChat(); window.addEventListener('fb-auth-ready', startRealChat); }

        // === Добавить в контакты ===
        addContactBtn.addEventListener('click', async () => {
            resolveOther();
            if (!otherUid || !window.fbAddContact) { toast('Не готово, подожди'); return; }
            const res = await window.fbAddContact(otherUid, realChatName, '');
            toast(res.ok ? '✓ Добавлен в контакты' : 'Не удалось');
        });

        // === Перевод F-coin через существующее меню (optCoin → coinModal) ===
        // переопределяем подтверждение перевода на реальный переток
        window._realChatTransfer = async function(amount){
            resolveOther();
            if (!otherUid || !window.fbTransferCoinsInChat) { toast('Не готово'); return false; }
            const res = await window.fbTransferCoinsInChat(realChatId, otherUid, amount);
            if (res.ok) {
                FocusStorage.saveUser({ coins: res.newBalance });
                toast('✓ Переведено ' + amount + ' F-coin');
                return true;
            } else {
                toast(res.error || 'Ошибка перевода');
                return false;
            }
        };
    } else {
        renderMsgs();
    }

    // ===== ИИ-подсказки ответов (заработают с реальным ИИ) =====
    (function(){
        const btn = document.getElementById('aiSuggestBtn');
        const panel = document.getElementById('aiSuggests');
        if (!btn || !panel) return;
        btn.addEventListener('click', async () => {
            if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
            panel.style.display = 'block';
            panel.innerHTML = '<div class="ai-suggest-hint">ИИ подбирает варианты...</div>';

            // TODO: когда подключим реальный ИИ (DeepSeek) — сюда придут 3 варианта
            // на основе последних сообщений чата. Пока — заглушка с примерами.
            let suggestions;
            if (window.fbAiSuggestReplies) {
                // реальный ИИ (появится после подключения)
                suggestions = await window.fbAiSuggestReplies(realChatId);
            } else {
                // временные примеры (демо до подключения ИИ)
                suggestions = [
                    'Звучит отлично! Расскажи подробнее 👍',
                    'Согласен, давай так и сделаем.',
                    'Мне нужно немного подумать, отвечу позже.'
                ];
            }
            panel.innerHTML = '';
            suggestions.forEach(s => {
                const item = document.createElement('div');
                item.className = 'ai-suggest-item';
                item.innerText = s;
                item.addEventListener('click', () => {
                    input.value = s;
                    input.dispatchEvent(new Event('input'));
                    panel.style.display = 'none';
                    input.focus();
                });
                panel.appendChild(item);
            });
            const hint = document.createElement('div');
            hint.className = 'ai-suggest-hint';
            hint.innerText = window.fbAiSuggestReplies ? 'Нажми вариант или напиши свой' : 'Примеры (ИИ активируется скоро) — можешь писать свой ответ';
            panel.appendChild(hint);
        });
    })();

</script>

    if ("serviceWorker" in navigator) { window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>

<script>
/* ПОДГРУЗКА ИСТОРИИ ПРИ ПРОКРУТКЕ ВВЕРХ (как в WhatsApp).
   Раньше показывались только последние сообщения — дальше история была недоступна.
   Теперь при прокрутке вверх подтягиваются следующие 50, и так до самого начала. */
(function(){
    var loading = false, noMore = false, oldestTs = null;

    // самое старое загруженное сообщение (его передаёт основной код чата)
    window.__chatSetOldest = function(ts){ if (ts) oldestTs = ts; };

    async function loadOlder(area){
        if (loading || noMore || !oldestTs) return;
        var chatId = new URLSearchParams(location.search).get('chatId');
        if (!chatId || !window.fbLoadOlderMessages || typeof renderMsg !== 'function') return;

        loading = true;
        var loader = document.createElement('div');
        loader.style.cssText = 'text-align:center;padding:10px;color:#8e8e9e;font-size:12px;';
        loader.textContent = 'Загружаю историю...';
        area.insertBefore(loader, area.firstChild);
        var prevH = area.scrollHeight;

        try {
            var r = await window.fbLoadOlderMessages(chatId, oldestTs, 50);
            loader.remove();
            if (!r.ok || !r.messages.length) { noMore = true; loading = false; return; }
            oldestTs = r.messages[0]._ts || oldestTs;
            if (!r.hasMore) noMore = true;

            var myUid = (window.fbCurrentUser && fbCurrentUser()) ? fbCurrentUser().uid : null;
            var frag = document.createDocumentFragment();
            r.messages.forEach(function(m){
                if (window.__shownIds) window.__shownIds.add(m.id);
                frag.appendChild(renderMsg(m, m.from === myUid));
            });
            area.insertBefore(frag, area.firstChild);
            area.scrollTop = area.scrollHeight - prevH;   // держим позицию — экран не прыгает
        } catch(e) { loader.remove(); }
        loading = false;
    }

    document.addEventListener('DOMContentLoaded', function(){
        var area = document.getElementById('messagesArea');
        if (!area) return;
        // подгружаем историю ТОЛЬКО когда юзер сам прокрутил вверх и есть что прокручивать.
        // Раньше срабатывало сразу при открытии чата — мелькала надпись «Загружаю историю».
        var userScrolled = false;
        area.addEventListener('touchstart', function(){ userScrolled = true; }, { passive: true });
        area.addEventListener('wheel', function(){ userScrolled = true; }, { passive: true });
        area.addEventListener('scroll', function(){
            if (!userScrolled) return;
            if (area.scrollHeight <= area.clientHeight + 40) return;
            if (area.scrollTop < 60) loadOlder(area);
        });
    });
})();
</script>


<script>
/* ОНЛАЙН-СТАТУС + КНОПКА «В КОНТАКТЫ» (как в WhatsApp).
   Разметка для этого была, но нигде не подключалась — статус висел статичным «онлайн». */
(function(){
    var peerUid = null;

    function peerFromChat(){
        var chatId = new URLSearchParams(location.search).get('chatId');
        var me = (window.fbCurrentUser && fbCurrentUser()) ? fbCurrentUser().uid : null;
        if (!chatId || !me || chatId.indexOf('__') === -1) return null;
        var parts = chatId.split('__');
        return parts[0] === me ? parts[1] : parts[0];
    }

    var _lastPresence = null;

    function paintStatus(p){
        var el = document.getElementById('hdrStatus');
        if (!el || !p) return;
        _lastPresence = p;
        el.textContent = p.text || '';
        el.style.color = p.online ? '#5ecf9a' : '#8e8e9e';
    }

    async function refreshStatus(){
        // запасной путь (если живая подписка недоступна)
        if (!peerUid || !window.fbGetPresence) return;
        paintStatus(await window.fbGetPresence(peerUid));
    }

    async function init(){
        peerUid = peerFromChat();
        if (!peerUid) return;
        /* ЖИВАЯ ПОДПИСКА вместо опроса.
           Раньше телефон каждые 30 секунд спрашивал базу «он в сети?» — это 120 лишних
           обращений в час и разряд батареи. Теперь база сама сообщает об изменении. */
        if (window.fbWatchPresence) {
            window.fbWatchPresence(peerUid, paintStatus);
            // раз в 30 сек ПЕРЕРИСОВЫВАЕМ текст локально («был 5 мин назад» → «6 мин»),
            // без обращения к сети
            setInterval(function(){
                if (_lastPresence && !_lastPresence.online) refreshStatus();
            }, 60000);
        } else {
            refreshStatus();
            setInterval(refreshStatus, 30000);
        }

        var btn = document.getElementById('addContactBtn');
        if (!btn || !window.fbGetContacts) return;
        var have = (await window.fbGetContacts()).some(function(c){ return c.uid === peerUid; });
        if (have) { btn.style.display = 'none'; return; }   // уже в контактах
        btn.style.display = 'flex';
        btn.addEventListener('click', async function(){
            btn.style.opacity = '0.5';
            var r = window.fbAddContact ? await window.fbAddContact(peerUid, (typeof realChatName !== 'undefined' ? realChatName : ''), '') : { ok:false };
            if (r && r.ok) { btn.style.display = 'none'; if (window.toast) toast('✓ Добавлен в контакты'); }
            else { btn.style.opacity = '1'; if (window.toast) toast('Не удалось добавить'); }
        });
    }

    if (window.FB_AUTH_READY) setTimeout(init, 300);
    else window.addEventListener('fb-auth-ready', function(){ setTimeout(init, 300); });
})();
</script>


<script>
/* КЛАВИАТУРА НЕ ЗАКРЫВАЕТ ПОЛЕ ВВОДА.
   В расширенном режиме (на весь экран) у .phone стоит height:100vh !important —
   обычный inline-стиль его НЕ перебивал, поэтому поле уезжало под клавиатуру.
   Теперь высоту ставим тоже с !important и следим за сдвигом (offsetTop). */
(function(){
    var vv = window.visualViewport;
    if (!vv) return;
    function el(){ return document.querySelector('.phone') || document.body; }
    function fit(){
        var ph = el();
        // высота видимой области (без клавиатуры) + компенсация сдвига страницы
        ph.style.setProperty('height', vv.height + 'px', 'important');
        ph.style.setProperty('max-height', vv.height + 'px', 'important');
        ph.style.setProperty('transform', 'translateY(' + (vv.offsetTop || 0) + 'px)', 'important');
        var area = document.getElementById('messagesArea');
        if (area) area.scrollTop = area.scrollHeight;
    }
    function reset(){
        var ph = el();
        ph.style.removeProperty('height');
        ph.style.removeProperty('max-height');
        ph.style.removeProperty('transform');
    }
    vv.addEventListener('resize', fit);
    vv.addEventListener('scroll', fit);
    document.addEventListener('focusin', function(e){
        if (e.target && e.target.classList && e.target.classList.contains('chat-input')) {
            setTimeout(fit, 60); setTimeout(fit, 250); setTimeout(fit, 500);
        }
    });
    document.addEventListener('focusout', function(e){
        if (e.target && e.target.classList && e.target.classList.contains('chat-input')) setTimeout(reset, 100);
    });
})();
</script>
