<!DOCTYPE html>
<html lang="ru" data-theme="original" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Астрология — FOCUS</title>
<link rel="stylesheet" href="focus-theme.css">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a12; color:#e8e8ee; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
    .wrap { max-width:440px; margin:0 auto; padding:18px 16px 60px; }
    .top { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .back { width:40px; height:40px; border-radius:12px; background:rgba(200,170,255,0.1); border:1px solid rgba(200,170,255,0.25); display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .back svg { width:20px; height:20px; color:#C8AAFF; }
    .top h1 { font-size:22px; font-weight:800; background:linear-gradient(135deg,#C8AAFF,#FFD966); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .sign-card { background:linear-gradient(165deg,#1a1626,#12101c); border:1px solid rgba(200,170,255,0.25); border-radius:24px; padding:30px 22px; text-align:center; margin-bottom:18px; }
    .sign-emoji { font-size:64px; margin-bottom:8px; }
    .sign-name { font-size:28px; font-weight:800; color:#fff; margin-bottom:4px; }
    .sign-element { font-size:14px; color:#C8AAFF; margin-bottom:14px; }
    .sign-trait { font-size:14px; color:#c8c8d0; line-height:1.5; }
    .section-title { font-size:15px; font-weight:700; color:#C8AAFF; margin:20px 0 10px; display:flex; align-items:center; gap:8px; }
    .forecast-card { background:rgba(200,170,255,0.05); border:1px solid rgba(200,170,255,0.15); border-radius:18px; padding:18px; font-size:14px; line-height:1.65; color:#e0e0e8; white-space:pre-wrap; }
    .gen-btn { width:100%; padding:16px; margin-top:16px; border:none; border-radius:16px; background:linear-gradient(135deg,#C8AAFF,#FFD966); color:#0a0a0f; font-size:16px; font-weight:800; font-family:inherit; cursor:pointer; }
    .gen-btn:active { transform:scale(0.98); }
    .gen-btn:disabled { opacity:0.6; }
    .no-data { text-align:center; color:#9a9aab; font-size:14px; padding:40px 20px; line-height:1.6; }
    .no-data a { color:#C8AAFF; }
    .loading { text-align:center; color:#C8AAFF; padding:20px; font-size:14px; }
</style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <div class="back" onclick="location.href='index.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <h1>Астрология</h1>
    </div>
    <div id="content"></div>
</div>

<script src="focus-astro.js"></script>
<script src="focus-ai.js"></script>
<script src="firebase-config.js"></script>
<script type="module" src="firebase-auth-helper.js"></script>
<script>
    const FS = (function(){
        try { return JSON.parse(localStorage.getItem('focus_user')) || {}; } catch(e){ return {}; }
    })();

    function render(){
        const content = document.getElementById('content');
        if (!FS.birthDate) {
            content.innerHTML = `<div class="no-data">🌙 Чтобы узнать твой знак и прогноз, укажи <b>дату рождения</b> в профиле.<br><br><a href="fokus_profile.html">Перейти в профиль →</a></div>`;
            return;
        }
        const z = FocusAstro.getZodiac(FS.birthDate);
        if (!z) { content.innerHTML = '<div class="no-data">Не удалось определить знак. Проверь дату рождения в профиле.</div>'; return; }

        content.innerHTML = `
            <div class="sign-card">
                <div class="sign-emoji">${z.emoji}</div>
                <div class="sign-name">${z.sign}</div>
                <div class="sign-element">Стихия: ${z.element}</div>
                <div class="sign-trait">${z.trait}</div>
            </div>
            <div class="section-title">✦ Астропрогноз судьбы</div>
            <div id="forecastArea">
                <button class="gen-btn" id="genBtn">🔮 Получить прогноз от ИИ</button>
            </div>`;

        document.getElementById('genBtn').addEventListener('click', getForecast);
    }

    async function getForecast(){
        const area = document.getElementById('forecastArea');
        area.innerHTML = '<div class="loading">☾ Звёзды складываются в прогноз...</div>';

        const z = FocusAstro.getZodiac(FS.birthDate);
        const astroCtx = FocusAstro.contextForAI(FS);
        const aboutText = getAboutText();

        const messages = [
            { role:'system', content:
                'Ты — мудрый астролог в приложении FOCUS. Составь тёплый, вдохновляющий и конкретный астропрогноз судьбы для человека. ' +
                'Опирайся на его знак зодиака, число судьбы и то что он рассказал о себе. ' +
                'Пиши живым русским, 4-6 предложений. Дай ощущение что прогноз лично для него. ' +
                'Не выдумывай точных дат событий. Говори о сильных сторонах, потенциале, на что обратить внимание. ' +
                'Без клише вроде "звёзды говорят". Пиши как мудрый наставник, который видит суть человека.'
            },
            { role:'user', content:
                'Мои астро-данные: ' + astroCtx + '.\n' +
                (aboutText ? ('Обо мне: ' + aboutText + '\n') : '') +
                'Составь мой астропрогноз судьбы.'
            }
        ];

        if (!window.fbAskAI) { area.innerHTML = '<div class="forecast-card">ИИ недоступен, обнови страницу.</div>'; return; }
        let res = await window.fbAskAI(messages, 600);
        if (res.ok && res.reply && res.reply.trim()) {
            area.innerHTML = '<div class="forecast-card">' + res.reply.trim().replace(/</g,'&lt;') + '</div>';
        } else {
            area.innerHTML = '<div class="forecast-card">⚠️ Не удалось получить прогноз. Причина: ' + (res.error || 'неизвестно') + '<br><br><button class="gen-btn" onclick="location.reload()">Попробовать снова</button></div>';
        }
    }

    function getAboutText(){
        const fields = ['b_story','b_moments','b_parents','b_relations','b_fears','b_dreams','b_free'];
        const parts = [];
        fields.forEach(f => { const v = localStorage.getItem('focus_about_' + f); if (v && v.trim()) parts.push(v.trim()); });
        return parts.join('. ').slice(0, 800);
    }

    render();
    // применяем тему
    try { document.getElementById('htmlRoot').setAttribute('data-theme', FS.theme || 'original'); } catch(e){}
</script>
<script>
    if ("serviceWorker" in navigator) { window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
</body>
</html>
