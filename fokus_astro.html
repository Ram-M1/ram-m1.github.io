<!DOCTYPE html>
<html lang="ru" data-theme="original" id="htmlRoot">
<head>
<style>html,body{background:#0a0a0f;margin:0;}</style>
<script>try{var _t=localStorage.getItem('focus_theme')||'original';document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Астрология — FOCUS</title>
<link rel="stylesheet" href="focus-theme.css">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg-2,#0d0d12); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:12px; overflow:hidden; }
    .phone { width:375px; height:700px; background:linear-gradient(165deg, var(--bg-1) 0%, var(--bg-2) 100%); border-radius:52px; box-shadow:0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(var(--accent-rgb),0.06), 0 0 0 8px #1c1c24, 0 0 0 9px rgba(var(--accent-rgb),0.08); overflow:hidden; display:flex; flex-direction:column; position:relative; }
    .scroll { flex:1; overflow-y:auto; scrollbar-width:none; padding:20px 18px 30px; position:relative; z-index:1; }
    .top { display:flex; align-items:center; gap:11px; margin-bottom:18px; padding-top:4px; }
    .scroll::-webkit-scrollbar { display:none; }
    @media (max-width:600px){ body{padding:0;} .phone{ width:100vw; height:100vh; height:100dvh; border-radius:0; box-shadow:none; } .scroll{ padding-top:calc(env(safe-area-inset-top) + 20px); padding-bottom:calc(env(safe-area-inset-bottom) + 30px); } }

    .top { display:flex; align-items:center; gap:11px; margin-bottom:18px; }
    .back { width:36px; height:36px; border-radius:11px; background:rgba(var(--accent-rgb),0.1); border:0.5px solid rgba(var(--accent-rgb),0.2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
    .back svg { width:17px; height:17px; color:var(--accent); }
    .top h1 { font-size:19px; font-weight:700; color:var(--text-strong); letter-spacing:0.2px; }

    .sign-card { background:linear-gradient(135deg, rgba(var(--accent-rgb),0.1), rgba(var(--accent-2-rgb),0.04)); border:0.5px solid rgba(var(--accent-rgb),0.22); border-radius:18px; padding:22px 18px; text-align:center; margin-bottom:14px; position:relative; overflow:hidden; }
    .sign-card::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle, rgba(var(--accent-rgb),0.08), transparent 55%); }
    .sign-emoji { font-size:40px; margin-bottom:6px; position:relative; }
    .sign-name { font-size:22px; font-weight:700; color:var(--text-strong); margin-bottom:3px; position:relative; }
    .sign-element { font-size:11px; color:var(--accent); letter-spacing:0.3px; margin-bottom:10px; position:relative; }
    .sign-trait { font-size:12.5px; color:#c8c8d0; line-height:1.5; position:relative; }

    .section-title { font-size:12px; font-weight:600; color:var(--accent); margin:16px 0 8px; letter-spacing:0.3px; display:flex; align-items:center; gap:6px; }
    .gen-btn { width:100%; padding:13px; border:none; border-radius:13px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#0a0a0f; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; letter-spacing:0.2px; }
    .gen-btn:active { transform:scale(0.98); }
    .forecast-card { background:linear-gradient(135deg, rgba(35,35,46,0.42), rgba(22,22,30,0.42)); border:0.5px solid rgba(var(--accent-rgb),0.12); border-radius:14px; padding:15px; font-size:13px; line-height:1.6; color:#e0e0e8; white-space:pre-wrap; }

    .no-data { text-align:center; color:#9a9aab; font-size:13px; padding:40px 20px; line-height:1.6; }
    .no-data a { color:var(--accent); text-decoration:none; }
    .loading { text-align:center; color:var(--accent); padding:16px; font-size:13px; }
</style>
</head>
<body>
<div class="phone">
    <canvas id="atmosCanvas" width="375" height="700" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;border-radius:52px;"></canvas>
    <div class="scroll">
        <div class="top">
            <div class="back" onclick="location.href='index.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <h1>Астрология</h1>
        </div>
        <div id="content"></div>
    </div>
</div>

<script src="focus-astro.js"></script>
<script src="focus-storage.js"></script>
<script src="focus-core.js"></script>
<script src="focus-ai.js"></script>
<script src="firebase-config.js"></script>
<script type="module" src="firebase-auth-helper.js"></script>
<script>
    const FS = (function(){ try { return JSON.parse(localStorage.getItem('focus_user')) || {}; } catch(e){ return {}; } })();
    try { document.getElementById('htmlRoot').setAttribute('data-theme', FS.theme || localStorage.getItem('focus_theme') || 'original'); } catch(e){}
    // запуск анимированного фона темы
    window.addEventListener('load', function(){ try { if (window.FocusCore && FocusCore.initAtmosphere) FocusCore.initAtmosphere('atmosCanvas'); } catch(e){} });

    function render(){
        const content = document.getElementById('content');
        if (!FS.birthDate) {
            content.innerHTML = '<div class="no-data">🌙 Чтобы узнать твой знак и прогноз, укажи <b>дату рождения</b> в профиле.<br><br><a href="fokus_profile.html">Перейти в профиль →</a></div>';
            return;
        }
        const z = FocusAstro.getZodiac(FS.birthDate);
        if (!z) { content.innerHTML = '<div class="no-data">Не удалось определить знак. Проверь дату рождения.</div>'; return; }

        content.innerHTML =
            '<div class="sign-card">' +
                '<div class="sign-emoji">' + z.emoji + '</div>' +
                '<div class="sign-name">' + z.sign + '</div>' +
                '<div class="sign-element">Стихия: ' + z.element + '</div>' +
                '<div class="sign-trait">' + z.trait + '</div>' +
            '</div>' +
            '<div class="section-title">☀️ Твой день сегодня</div>' +
            '<div id="dailyArea"><button class="gen-btn" id="dailyBtn">Прогноз на сегодня</button></div>' +
            '<div class="section-title">🌙 Астропрогноз судьбы</div>' +
            '<div id="forecastArea"><button class="gen-btn" id="genBtn">Раскрыть судьбу от ИИ</button></div>';

        document.getElementById('genBtn').addEventListener('click', getForecast);
        document.getElementById('dailyBtn').addEventListener('click', getDaily);
    }

    async function getDaily(){
        const area = document.getElementById('dailyArea');
        area.innerHTML = '<div class="loading">☀️ Читаю звёзды на сегодня...</div>';
        const z = FocusAstro.getZodiac(FS.birthDate);
        const astroCtx = FocusAstro.contextForAI(FS);
        const today = new Date().toLocaleDateString('ru-RU', { day:'numeric', month:'long' });
        const messages = [
            { role:'system', content: 'Ты — астролог в приложении FOCUS. Составь короткий вдохновляющий гороскоп на СЕГОДНЯ (' + today + ') для знака ' + z.sign + '. Учитывай тип личности. Дай настрой на день: что благоприятно, совет. Живой русский, 3-4 предложения, тепло. Без «звёзды говорят».' },
            { role:'user', content: 'Мой знак: ' + z.sign + '. ' + astroCtx + '. Гороскоп на сегодня.' }
        ];
        if (!window.fbAskAI) { area.innerHTML = '<div class="forecast-card">ИИ недоступен.</div>'; return; }
        try { if (window.FocusStorage && FocusStorage.canUseAI && !FocusStorage.canUseAI('astro','text').ok) { area.innerHTML = '<div class="forecast-card">🔒 Лимит ИИ исчерпан. Пополни F-coin или оформи подписку.</div>'; return; } } catch(e){}
        let res = await window.fbAskAI(messages, 400);
        if (!(res && res.ok && res.reply && res.reply.trim())) {
            await new Promise(function(r){ setTimeout(r, 900); });   // пауза и ретрай (два запроса разом могли захлебнуться)
            res = await window.fbAskAI(messages, 400);
        }
        if (res && res.ok && res.reply && res.reply.trim()) { try { if (window.FocusStorage && FocusStorage.useAI) FocusStorage.useAI('astro','text'); } catch(e){} }
        area.innerHTML = (res.ok && res.reply && res.reply.trim())
            ? '<div class="forecast-card">' + res.reply.trim().replace(/</g,'&lt;') + '</div>'
            : '<div class="forecast-card">Звёзды сегодня молчат — загляни чуть позже, прогноз обновится.</div>';
    }

    async function getForecast(){
        const area = document.getElementById('forecastArea');
        area.innerHTML = '<div class="loading">☾ Звёзды складываются в прогноз...</div>';
        const astroCtx = FocusAstro.contextForAI(FS);
        const aboutText = getAboutText();
        const messages = [
            { role:'system', content: 'Ты — мудрый астролог в приложении FOCUS. Составь тёплый вдохновляющий астропрогноз судьбы. Опирайся на знак зодиака, число судьбы и что человек рассказал о себе. Учитывай тип личности, адаптируй. Живой русский, 4-6 предложений. Без клише вроде «звёзды говорят». Как мудрый наставник, который видит суть человека.' },
            { role:'user', content: 'Мои астро-данные: ' + astroCtx + '.\n' + (aboutText ? ('Обо мне: ' + aboutText + '\n') : '') + 'Составь мой астропрогноз судьбы.' }
        ];
        if (!window.fbAskAI) { area.innerHTML = '<div class="forecast-card">ИИ недоступен, обнови страницу.</div>'; return; }
        try { if (window.FocusStorage && FocusStorage.canUseAI && !FocusStorage.canUseAI('astro','text').ok) { area.innerHTML = '<div class="forecast-card">🔒 Лимит ИИ исчерпан. Пополни F-coin или оформи подписку.</div>'; return; } } catch(e){}
        let res = await window.fbAskAI(messages, 600);
        if (!(res && res.ok && res.reply && res.reply.trim())) {
            await new Promise(function(r){ setTimeout(r, 900); });
            res = await window.fbAskAI(messages, 600);
        }
        if (res && res.ok && res.reply && res.reply.trim()) { try { if (window.FocusStorage && FocusStorage.useAI) FocusStorage.useAI('astro','text'); } catch(e){} }
        area.innerHTML = (res.ok && res.reply && res.reply.trim())
            ? '<div class="forecast-card">' + res.reply.trim().replace(/</g,'&lt;') + '</div>'
            : '<div class="forecast-card">Прогноз готовится — попробуй обновить через минуту.</div>';
    }

    function getAboutText(){
        const fields = ['b_story','b_moments','b_parents','b_relations','b_fears','b_dreams','b_free'];
        const parts = [];
        fields.forEach(f => { const v = localStorage.getItem('focus_about_' + f); if (v && v.trim()) parts.push(v.trim()); });
        return parts.join('. ').slice(0, 800);
    }

    render();
</script>
<script>
    if ("serviceWorker" in navigator) { window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
<script src="focus-reminders.js"></script>
</body>
</html>
