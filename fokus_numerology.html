<!DOCTYPE html>
<html lang="ru" data-theme="original" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Нумерология — FOCUS</title>
<link rel="stylesheet" href="focus-theme.css">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif; background:#060608; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:12px; overflow:hidden; }
    .phone { width:375px; height:700px; background:linear-gradient(165deg, var(--bg-1) 0%, var(--bg-2) 100%); border-radius:52px; box-shadow:0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(var(--accent-rgb),0.06), 0 0 0 8px #1c1c24, 0 0 0 9px rgba(var(--accent-rgb),0.08); overflow:hidden; display:flex; flex-direction:column; position:relative; }
    .scroll { flex:1; overflow-y:auto; scrollbar-width:none; padding:28px 18px 30px; }
    .scroll::-webkit-scrollbar { display:none; }
    @media (max-width:600px){ body{padding:0;} .phone{ width:100vw; height:100vh; height:100dvh; border-radius:0; box-shadow:none; } .scroll{ padding-top:calc(env(safe-area-inset-top) + 20px); padding-bottom:calc(env(safe-area-inset-bottom) + 30px); } }

    .top { display:flex; align-items:center; gap:11px; margin-bottom:18px; padding-top:4px; }
    .back { width:36px; height:36px; border-radius:11px; background:rgba(var(--accent-rgb),0.1); border:0.5px solid rgba(var(--accent-rgb),0.2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
    .back svg { width:17px; height:17px; color:var(--accent); }
    .top h1 { font-size:19px; font-weight:700; color:var(--text-strong); letter-spacing:0.2px; }

    .hero { background:linear-gradient(135deg, rgba(var(--accent-rgb),0.1), rgba(var(--accent-2-rgb),0.04)); border:0.5px solid rgba(var(--accent-rgb),0.22); border-radius:18px; padding:20px 18px; text-align:center; margin-bottom:11px; position:relative; overflow:hidden; }
    .hero::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle, rgba(var(--accent-rgb),0.08), transparent 55%); }
    .hero-num { font-size:52px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent-2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; line-height:1; position:relative; }
    .hero-title { font-size:17px; font-weight:700; color:var(--text-strong); margin:5px 0 7px; position:relative; }
    .hero-desc { font-size:12.5px; color:#c8c8d0; line-height:1.5; position:relative; }

    .nums-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
    .num-cell { background:linear-gradient(135deg, rgba(35,35,46,0.42), rgba(22,22,30,0.42)); border:0.5px solid rgba(var(--accent-rgb),0.12); border-radius:13px; padding:12px 6px; text-align:center; }
    .num-cell .n { font-size:24px; font-weight:700; color:#FFD966; }
    .num-cell .l { font-size:9.5px; color:#8e8e9e; margin-top:2px; line-height:1.3; }

    .section-title { font-size:12px; font-weight:600; color:var(--accent); margin:16px 0 8px; letter-spacing:0.3px; }
    .gen-btn { width:100%; padding:13px; border:none; border-radius:13px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#0a0a0f; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; letter-spacing:0.2px; }
    .gen-btn:active { transform:scale(0.98); }
    .forecast-card { background:linear-gradient(135deg, rgba(35,35,46,0.42), rgba(22,22,30,0.42)); border:0.5px solid rgba(var(--accent-rgb),0.12); border-radius:14px; padding:15px; font-size:13px; line-height:1.6; color:#e0e0e8; white-space:pre-wrap; margin-top:8px; }

    .compat-box { background:linear-gradient(135deg, rgba(255,138,176,0.08), rgba(200,170,255,0.04)); border:0.5px solid rgba(255,138,176,0.2); border-radius:16px; padding:16px; margin-top:16px; }
    .compat-box h3 { font-size:14px; color:var(--text-strong); margin-bottom:4px; font-weight:700; }
    .compat-box p { font-size:11px; color:#9a9aab; margin-bottom:11px; line-height:1.5; }
    .compat-input { width:100%; background:rgba(0,0,0,0.3); border:0.5px solid rgba(200,170,255,0.2); border-radius:11px; padding:11px; color:var(--text-strong); font-size:13px; font-family:inherit; outline:none; margin-bottom:10px; }
    .compat-result { display:none; text-align:center; margin-top:12px; }
    .compat-pct { font-size:34px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent-2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .compat-desc { font-size:12px; color:#c8c8d0; line-height:1.5; margin-top:6px; }

    .no-data { text-align:center; color:#9a9aab; font-size:13px; padding:40px 20px; line-height:1.6; }
    .no-data a { color:var(--accent); text-decoration:none; }
    .loading { text-align:center; color:var(--accent); padding:16px; font-size:13px; }
</style>
</head>
<body>
<div class="phone">
    <canvas id="atmosCanvas" width="375" height="700" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;border-radius:52px;"></canvas>
    <div class="scroll">
        <div class="top">
            <div class="back" onclick="location.href='index.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <h1>Нумерология</h1>
        </div>
        <div id="content"></div>
    </div>
</div>

<script src="focus-astro.js"></script>
<script src="focus-core.js"></script>
<script src="focus-ai.js"></script>
<script src="firebase-config.js"></script>
<script type="module" src="firebase-auth-helper.js"></script>
<script>
    const FS = (function(){ try { return JSON.parse(localStorage.getItem('focus_user')) || {}; } catch(e){ return {}; } })();
    try { document.getElementById('htmlRoot').setAttribute('data-theme', FS.theme || localStorage.getItem('focus_theme') || 'original'); } catch(e){}
    window.addEventListener('load', function(){ try { if (window.FocusCore && FocusCore.initAtmosphere) FocusCore.initAtmosphere('atmosCanvas'); } catch(e){} });

    function render(){
        const content = document.getElementById('content');
        if (!FS.birthDate) {
            content.innerHTML = '<div class="no-data">🔢 Чтобы узнать свои числа, укажи <b>дату рождения</b> в профиле.<br><br><a href="fokus_profile.html">Перейти в профиль →</a></div>';
            return;
        }
        const lp = FocusAstro.getLifePathNumber(FS.birthDate);
        const soul = FocusAstro.getSoulNumber(FS.birthDate);
        const mission = FocusAstro.getMissionNumber(FS.birthDate);
        const nameNum = FocusAstro.getNameNumber(FS.name || '');
        const meaning = FocusAstro.lifePathMeaning(lp);

        content.innerHTML =
            '<div class="hero">' +
                '<div class="hero-num">' + lp + '</div>' +
                '<div class="hero-title">' + (meaning ? meaning.title : 'Число судьбы') + '</div>' +
                '<div class="hero-desc">' + (meaning ? meaning.desc : '') + '</div>' +
            '</div>' +
            '<div class="nums-grid">' +
                '<div class="num-cell"><div class="n">' + soul + '</div><div class="l">Число<br>души</div></div>' +
                '<div class="num-cell"><div class="n">' + mission + '</div><div class="l">Число<br>миссии</div></div>' +
                '<div class="num-cell"><div class="n">' + (nameNum||'—') + '</div><div class="l">Число<br>имени</div></div>' +
            '</div>' +
            '<div class="section-title">✦ Глубокий разбор от ИИ</div>' +
            '<div id="forecastArea"><button class="gen-btn" id="genBtn">Раскрыть мой путь</button></div>' +
            '<div class="compat-box">' +
                '<h3>💞 Совместимость</h3>' +
                '<p>Узнай насколько вы совпадаете с партнёром. Введи его число судьбы (1–9, 11, 22, 33).</p>' +
                '<input type="number" class="compat-input" id="compatInput" placeholder="Число судьбы партнёра">' +
                '<button class="gen-btn" id="compatBtn" style="background:linear-gradient(135deg,#FF8AB0,var(--accent));">Проверить совместимость</button>' +
                '<div class="compat-result" id="compatResult"><div class="compat-pct" id="compatPct"></div><div class="compat-desc" id="compatDesc"></div></div>' +
            '</div>';

        document.getElementById('genBtn').addEventListener('click', getForecast);
        document.getElementById('compatBtn').addEventListener('click', checkCompat);
    }

    async function getForecast(){
        const area = document.getElementById('forecastArea');
        area.innerHTML = '<div class="loading">✦ Числа раскрывают твой путь...</div>';
        const numCtx = FocusAstro.contextForAI(FS);
        const soul = FocusAstro.getSoulNumber(FS.birthDate);
        const mission = FocusAstro.getMissionNumber(FS.birthDate);
        const aboutText = getAboutText();
        const messages = [
            { role:'system', content: 'Ты — мудрый нумеролог в приложении FOCUS. Составь глубокий вдохновляющий разбор жизненного пути. У человека: число судьбы, число души (' + soul + ' — внутренние желания), число миссии (' + mission + ' — предназначение), число имени, знак зодиака. Учитывай тип личности, адаптируй. Опирайся на то что человек рассказал о себе. Живой русский, 4-6 предложений. Раскрой сильные стороны, предназначение. Лично, без клише.' },
            { role:'user', content: 'Мои данные: ' + numCtx + '. Число души: ' + soul + ', число миссии: ' + mission + '.\n' + (aboutText ? ('Обо мне: ' + aboutText + '\n') : '') + 'Раскрой мой путь.' }
        ];
        if (!window.fbAskAI) { area.innerHTML = '<div class="forecast-card">ИИ недоступен, обнови страницу.</div>'; return; }
        let res = await window.fbAskAI(messages, 600);
        area.innerHTML = (res.ok && res.reply && res.reply.trim())
            ? '<div class="forecast-card">' + res.reply.trim().replace(/</g,'&lt;') + '</div>'
            : '<div class="forecast-card">⚠️ Не удалось получить разбор. ' + (res.error || '') + '</div>';
    }

    function checkCompat(){
        const partnerNum = parseInt(document.getElementById('compatInput').value);
        if (!partnerNum || isNaN(partnerNum)) { document.getElementById('compatInput').style.borderColor = '#FF6B6B'; return; }
        const myNum = FocusAstro.getLifePathNumber(FS.birthDate);
        const pct = FocusAstro.getCompatibility(myNum, partnerNum);
        document.getElementById('compatPct').innerText = pct + '%';
        let desc;
        if (pct >= 80) desc = 'Прекрасное совпадение! Ваши числа резонируют — вы усиливаете друг друга.';
        else if (pct >= 65) desc = 'Хорошая совместимость. Много общего, а различия делают союз интереснее.';
        else if (pct >= 50) desc = 'Средняя совместимость. Понадобится работа над пониманием, но это возможно.';
        else desc = 'Непростое сочетание. Разные энергии — но противоположности создают сильные пары.';
        document.getElementById('compatDesc').innerText = desc;
        document.getElementById('compatResult').style.display = 'block';
    }

    function getAboutText(){
        const fields = ['b_story','b_moments','b_parents','b_relations','b_fears','b_dreams','b_free'];
        const parts = [];
        fields.forEach(f => { const v = localStorage.getItem('focus_about_' + f); if (v && v.trim()) parts.push(v.trim()); });
        return parts.join('. ').slice(0, 800);
    }

    render();
</script>
<script>
    if ("serviceWorker" in navigator) { window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
</body>
</html>
