<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Диагностика — FOCUS</title>
<style>
    body { background:#0a0a0f; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
        background:#0a0a0f; color:#fff; padding:20px; padding-top:calc(20px + env(safe-area-inset-top,0px));
        max-width:560px; margin:0 auto; line-height:1.45; }
    h1 { font-size:21px; margin-bottom:4px; }
    .sub { color:#8e8e9e; font-size:13px; margin-bottom:20px; }
    .card { background:#14141c; border:1px solid #23232e; border-radius:14px; padding:14px 15px; margin-bottom:11px; }
    .row { display:flex; align-items:flex-start; gap:10px; padding:7px 0; }
    .ic { flex:0 0 22px; font-size:16px; line-height:1.3; }
    .tx { flex:1; min-width:0; }
    .t1 { font-size:14px; font-weight:600; }
    .t2 { font-size:12px; color:#8e8e9e; margin-top:2px; word-break:break-word; }
    .ok   { color:#5ecf9a; }
    .bad  { color:#ff6b6b; }
    .warn { color:#ffc44d; }
    button { width:100%; padding:13px; border:none; border-radius:12px; font-size:14px; font-weight:700;
        cursor:pointer; margin-top:9px; background:linear-gradient(135deg,#FFD966,#C8AAFF); color:#0a0a0f; }
    button.sec { background:#23232e; color:#fff; }
    button:disabled { opacity:0.5; }
    .hint { background:rgba(255,107,107,0.09); border:1px solid rgba(255,107,107,0.28);
        border-radius:11px; padding:11px 13px; font-size:12.5px; color:#ffb3b3; margin-top:9px; }
    .hint b { color:#fff; }
    h2 { font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:#6e6e7e; margin:18px 0 8px; }
    a { color:#FFD966; }
</style>
</head>
<body>

<h1>Диагностика</h1>
<div class="sub">Покажет, что именно сломано в напоминаниях</div>

<div id="out"><div class="card"><div class="row"><div class="ic">⏳</div><div class="tx"><div class="t1">Проверяю...</div></div></div></div></div>

<h2>Проверить почту</h2>
<div class="card">
    <div class="t2" style="margin-bottom:4px;">Отправит письмо прямо сейчас и покажет ответ почтовой службы.</div>
    <button id="mailBtn">Отправить тестовое письмо</button>
    <div id="mailRes"></div>
</div>

<h2>Проверить напоминание</h2>
<div class="card">
    <div class="t2" style="margin-bottom:4px;">Поставит напоминание через 2 минуты. Закрой приложение и жди.</div>
    <button id="remBtn" class="sec">Поставить тест на 2 минуты</button>
    <div id="remRes"></div>
</div>

<button class="sec" onclick="location.href='index.html'" style="margin-top:18px;">← На главную</button>

<script src="focus-storage.js"></script>
<script src="focus-ai.js"></script>
<script src="focus-reminders.js"></script>
<script type="module" src="firebase-auth-helper.js"></script>
<script>
const API = (window.FOCUS_AI_PROXY || 'https://focus-ai.playing-life-rama.workers.dev').replace(/\/+$/, '');
const out = document.getElementById('out');

function row(state, title, detail){
    const ic = state === 'ok' ? '✅' : state === 'bad' ? '🔴' : state === 'warn' ? '⚠️' : '•';
    const cls = state === 'ok' ? 'ok' : state === 'bad' ? 'bad' : state === 'warn' ? 'warn' : '';
    return '<div class="row"><div class="ic">' + ic + '</div><div class="tx">' +
           '<div class="t1 ' + cls + '">' + title + '</div>' +
           (detail ? '<div class="t2">' + detail + '</div>' : '') + '</div></div>';
}
function esc(s){ return String(s||'').replace(/</g,'&lt;'); }

async function run(){
    let html = '';
    const probs = [];

    // ── ВЕРСИЯ ──
    let ver = '?';
    try {
        const regs = await navigator.serviceWorker.getRegistrations();
        const c = await caches.keys();
        const m = c.find(x => /focus-cache-v\d+/.test(x));
        ver = m ? m.match(/v\d+/)[0] : '?';
    } catch(e){}

    // ── ПРОФИЛЬ ──
    const u = (window.FocusStorage && FocusStorage.getUser()) || {};
    const email = u.email || '';
    const uid = (window.fbCurrentUser && window.fbCurrentUser()) || null;

    html += '<div class="card">';
    html += row(ver !== '?' ? 'ok' : 'warn', 'Версия приложения: ' + ver, 'Должна быть v169 или новее');
    if (email) html += row('ok', 'Почта в профиле', esc(email));
    else { html += row('bad', 'В профиле НЕТ почты', 'Без неё письмо отправить некуда'); probs.push('нет почты в профиле'); }
    html += row(uid ? 'ok' : 'bad', uid ? 'Вход выполнен' : 'НЕ авторизован', uid ? '' : 'Зайди в приложение заново');

    // ── РАЗРЕШЕНИЕ НА УВЕДОМЛЕНИЯ ──
    let perm = 'нет поддержки';
    try { perm = Notification.permission; } catch(e){}
    if (perm === 'granted') html += row('ok', 'Уведомления разрешены', '');
    else if (perm === 'denied') { html += row('bad', 'Уведомления ЗАПРЕЩЕНЫ', 'Нажми на замок в адресной строке → разреши уведомления'); probs.push('уведомления запрещены'); }
    else { html += row('warn', 'Уведомления не разрешены', 'Нажми кнопку ниже'); }
    html += '</div>';

    if (perm !== 'granted') {
        html += '<div class="card"><button id="permBtn">Разрешить уведомления</button></div>';
    }

    // ── СЕРВЕР ──
    html += '<h2>Сервер</h2><div class="card">';
    try {
        const r = await fetch(API + '/diag', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ uid: uid, email: email })
        });
        const d = await r.json();

        // таймер (Cron)
        if (d.cron && d.cron.lastError) {
            html += row('bad', 'Таймер сервера ПАДАЕТ С ОШИБКОЙ', esc(d.cron.lastError));
            probs.push('ошибка внутри таймера');
        }
        if (d.cron && d.cron.minutesAgo !== null && d.cron.minutesAgo !== undefined) {
            const m = d.cron.minutesAgo;
            if (m <= 10) html += row('ok', 'Таймер сервера работает', 'последний запуск ' + m + ' мин назад');
            else { html += row('bad', 'Таймер сервера МОЛЧИТ', 'последний запуск ' + m + ' мин назад'); probs.push('таймер (Cron) не работает'); }
        } else {
            html += row('bad', 'Таймер сервера НИ РАЗУ не запускался',
                'Cloudflare → focus-ai → Settings → Trigger Events → Add Cron Trigger → <b>*/5 * * * *</b>');
            probs.push('Cron не запускался ни разу');
        }

        // ключи
        const s = d.server || {};
        html += row(s.resend ? 'ok' : 'bad', s.resend ? 'Почтовая служба подключена' : 'RESEND_KEY не настроен', '');
        html += row(s.firebase ? 'ok' : 'bad', s.firebase ? 'База данных подключена' : 'FIREBASE_SERVICE_ACCOUNT не настроен', '');

        // пуш-токен
        if (d.user) {
            html += row(d.user.pushToken ? 'ok' : 'warn',
                d.user.pushToken ? 'Пуш-уведомления подключены' : 'Пуш-токен НЕ зарегистрирован',
                d.user.pushToken ? '' : 'Разреши уведомления — тогда придёт и пуш');
            if (d.user.coinsBought !== null && d.user.coinsBought !== undefined)
                html += row('ok', 'Баланс в облаке', 'всего: ' + d.user.coins + ' · купленных: ' + d.user.coinsBought);
        }
        html += '</div>';

        // ── НАПОМИНАНИЯ ──
        html += '<h2>Мои напоминания на сервере</h2><div class="card">';
        const rem = d.reminders || [];
        if (!rem.length) {
            html += row('bad', 'На сервере НЕТ ни одного напоминания',
                'Значит команда ассистента до сервера не дошла');
            probs.push('напоминания не доходят до сервера');
        } else {
            rem.sort(function(a,b){ return b.at - a.at; }).slice(0,6).forEach(function(x){
                const when = new Date(x.at).toLocaleString('ru-RU');
                if (x.error) {
                    html += row('bad', esc(x.text), when + ' · ОШИБКА ПОЧТЫ: ' + esc(x.error));
                    probs.push('почта отклоняет письма');
                } else if (x.sent && x.mailOk) html += row('ok', esc(x.text), when + ' · письмо отправлено');
                else if (x.sent) html += row('warn', esc(x.text), when + ' · помечено отправленным');
                else html += row('warn', esc(x.text), when + ' · ждёт отправки');
            });
        }
        html += '</div>';
    } catch(e) {
        html += row('bad', 'Сервер не отвечает', esc(e.message)) + '</div>';
        probs.push('сервер недоступен');
    }

    // ── ВЫВОД ──
    if (probs.length) {
        html += '<div class="hint"><b>Найдено проблем: ' + probs.length + '</b><br>• ' + probs.join('<br>• ') + '</div>';
    } else {
        html += '<div class="card">' + row('ok', 'Всё в порядке', 'Напоминания должны приходить') + '</div>';
    }

    out.innerHTML = html;

    const pb = document.getElementById('permBtn');
    if (pb) pb.addEventListener('click', async function(){
        try {
            await Notification.requestPermission();
            if (window.fbEnablePush) await window.fbEnablePush();
        } catch(e){}
        run();
    });
}

// ── тестовое письмо ──
document.getElementById('mailBtn').addEventListener('click', async function(){
    const b = this, box = document.getElementById('mailRes');
    const u = (window.FocusStorage && FocusStorage.getUser()) || {};
    if (!u.email) { box.innerHTML = '<div class="hint">В профиле нет почты</div>'; return; }
    b.disabled = true; b.textContent = 'Отправляю...';
    try {
        const r = await fetch(API + '/diag/email', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email: u.email })
        });
        const d = await r.json();
        if (d.ok) box.innerHTML = '<div class="card" style="margin-top:9px;">' +
            row('ok', 'Письмо отправлено', 'Проверь почту ' + esc(u.email) + ' (и папку «Спам»)') + '</div>';
        else box.innerHTML = '<div class="hint"><b>Почта отклонила отправку</b><br>' +
            esc(d.response || d.error || '') + '</div>';
    } catch(e) { box.innerHTML = '<div class="hint">' + esc(e.message) + '</div>'; }
    b.disabled = false; b.textContent = 'Отправить тестовое письмо';
});

// ── тестовое напоминание ──
document.getElementById('remBtn').addEventListener('click', async function(){
    const b = this, box = document.getElementById('remRes');
    b.disabled = true; b.textContent = 'Ставлю...';
    try {
        const r = await window.FocusReminders.schedule('Проверка FOCUS', 'через 2 минуты');
        if (r && r.ok) {
            box.innerHTML = '<div class="card" style="margin-top:9px;">' +
                row('ok', 'Напоминание поставлено', 'Сработает: ' + new Date(r.at).toLocaleTimeString('ru-RU') +
                    '. Закрой приложение и жди письмо + уведомление.') + '</div>';
            setTimeout(run, 1500);
        } else {
            box.innerHTML = '<div class="hint">' + esc((r && r.error) || 'Не удалось') + '</div>';
        }
    } catch(e) { box.innerHTML = '<div class="hint">' + esc(e.message) + '</div>'; }
    b.disabled = false; b.textContent = 'Поставить тест на 2 минуты';
});

if (window.FB_AUTH_READY) run();
else { window.addEventListener('fb-auth-ready', run); setTimeout(run, 2500); }
</script>
</body>
</html>
