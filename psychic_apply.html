/* PWA-режим (установлено на телефон): на весь реальный экран, без макетной рамки */
@media (display-mode: standalone), (display-mode: fullscreen) {
    html, body { background: var(--bg-1, #0d0d12) !important; padding: 0 !important; overflow: hidden !important; }
    .phone {
        width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding-top: env(safe-area-inset-top) !important;
        padding-bottom: env(safe-area-inset-bottom) !important;
        max-width: 100vw !important;
    }
    .phone::before, .phone::after { display: none !important; }
    #atmosCanvas, #cosmicCanvas, #medCanvas, #atmos, .atmos-canvas { border-radius: 0 !important; }
    .modal, .slideshow, .session-area { border-radius: 0 !important; }
    #atmosCanvas, #cosmicCanvas, #medCanvas, .atmos-canvas, canvas#atmos {
        width: 100vw !important; height: 100vh !important; height: 100dvh !important;
        position: absolute !important; inset: 0 !important;
    }
}

/* Телефоны: приложение на весь экран без макетной рамки (надёжно, не зависит от PWA-режима) */
@media (max-width: 600px) {
    * { -webkit-user-select: none !important; user-select: none !important; -webkit-tap-highlight-color: transparent !important; }
    input, textarea { -webkit-user-select: text !important; user-select: text !important; }
    html, body { background: var(--bg-1, #0d0d12) !important; padding: 0 !important; margin: 0 !important; overflow: hidden !important; height: 100vh; height: 100dvh; display: block !important; }
    body { display: flex !important; align-items: stretch !important; justify-content: flex-start !important; }
    .phone {
        width: 100vw !important;
        max-width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
    }
    .phone::before, .phone::after { display: none !important; }
    /* анимация/фон идут до самого верха под чёлку */
    #atmosCanvas, #cosmicCanvas, #medCanvas, .atmos-canvas, canvas#atmos {
        width: 100vw !important; height: 100vh !important; height: 100dvh !important;
        position: absolute !important; inset: 0 !important; border-radius: 0 !important;
    }
    /* safe-area отступ даём контенту, а не фону — чтобы не было чёрной полосы */
    .screen, .session-area, .slideshow, .scroll-area {
        padding-top: calc(env(safe-area-inset-top) + 8px) !important;
    }
    .modal, .slideshow, .session-area { border-radius: 0 !important; }
}

<script>
    if (typeof FocusStorage === 'undefined') {
        window.FocusStorage = {
            _key:'focus_user',
            getUser(){ try { return JSON.parse(localStorage.getItem(this._key)) || {}; } catch(e){ return {}; } },
            saveUser(p){ const c=this.getUser(); const m={...c,...p}; localStorage.setItem(this._key, JSON.stringify(m)); return m; },
            getTheme(){ return this.getUser().theme || 'original'; },
            setTheme(id){ this.saveUser({ theme:id }); }
        };
    }
    if (typeof FocusCore === 'undefined') {
        window.FocusCore = {
            applyStoredTheme(){ (document.getElementById('htmlRoot')||document.documentElement).setAttribute('data-theme', FocusStorage.getTheme()); },
initAtmosphere(canvasId) {
                const ac = document.getElementById(canvasId || 'atmosCanvas');
                if (!ac) return;
                const actx = ac.getContext('2d');
                ac.width = 375; ac.height = 700;
                let tronPulses=[], mkEmbers=[], mkDrips=[], mkFlash=0, mkBolt=null, matrixDrops=null, matrixColumns=0;
                let predatorRadarAngle=0, predatorScanY=0, predatorT=0, predatorBlips=[{a:1.2,r:0.7},{a:3.8,r:0.5}], predatorReticle=null;
                const matrixChars = 'アイウエオカキクケコサシスセソ0123456789ABCDEF'.split('');
                let lastTheme=null, lastTrigger=0, washT=0;
                function currentTheme() { const r = document.getElementById('htmlRoot') || document.documentElement; return r.getAttribute('data-theme') || 'original'; }
                function cssColor(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
                function cssColorRgb(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
                function drawFullScreenWash() {
                    washT += 0.008;
                    const accRgb = cssColorRgb('--accent-rgb'), acc2Rgb = cssColorRgb('--accent-2-rgb');
                    const x = ac.width*(0.5+Math.sin(washT)*0.5), y = ac.height*(0.5+Math.cos(washT*0.7)*0.5);
                    const grad = actx.createRadialGradient(x,y,0,ac.width/2,ac.height/2,Math.max(ac.width,ac.height)*0.9);
                    grad.addColorStop(0,'rgba('+accRgb+',0.05)'); grad.addColorStop(0.5,'rgba('+acc2Rgb+',0.035)'); grad.addColorStop(1,'rgba(0,0,0,0)');
                    actx.fillStyle = grad; actx.fillRect(0,0,ac.width,ac.height);
                }
                function drawTron() {
                    if (Math.random() > 0.93) {
                        const vertical = Math.random() > 0.5;
                        tronPulses.push({ vertical, pos: Math.floor(Math.random()*(vertical?ac.width:ac.height)), t:-40, speed:3+Math.random()*2, color: Math.random()>0.5?cssColor('--accent'):cssColor('--accent-2'), len:60 });
                    }
                    tronPulses.forEach(p => {
                        p.t += p.speed;
                        const grad = p.vertical ? actx.createLinearGradient(p.pos,p.t-p.len,p.pos,p.t) : actx.createLinearGradient(p.t-p.len,p.pos,p.t,p.pos);
                        grad.addColorStop(0,'rgba(0,0,0,0)'); grad.addColorStop(1,p.color);
                        actx.strokeStyle = grad; actx.lineWidth=2; actx.shadowBlur=8; actx.shadowColor=p.color;
                        actx.beginPath();
                        if (p.vertical) { actx.moveTo(p.pos,p.t-p.len); actx.lineTo(p.pos,p.t); } else { actx.moveTo(p.t-p.len,p.pos); actx.lineTo(p.t,p.pos); }
                        actx.stroke();
                    });
                    actx.shadowBlur=0;
                    tronPulses = tronPulses.filter(p => p.t < Math.max(ac.width,ac.height)+40);
                }
                function drawPredator() {
                    predatorT += 0.01;
                    for (let i=0;i<5;i++) {
                        const x = ac.width/2+Math.sin(predatorT+i*2)*ac.width*0.35, y = ac.height/2+Math.cos(predatorT*0.7+i*1.7)*ac.height*0.4;
                        const r = 60+Math.sin(predatorT*2+i)*20;
                        const grad = actx.createRadialGradient(x,y,0,x,y,r);
                        grad.addColorStop(0,'rgba('+cssColorRgb('--accent-rgb')+',0.05)'); grad.addColorStop(1,'rgba('+cssColorRgb('--accent-rgb')+',0)');
                        actx.fillStyle = grad; actx.fillRect(0,0,ac.width,ac.height);
                    }
                    predatorScanY += 1.8; if (predatorScanY > ac.height+20) predatorScanY=-20;
                    const acc2 = cssColorRgb('--accent-2-rgb');
                    const lineGrad = actx.createLinearGradient(0,predatorScanY-15,0,predatorScanY+15);
                    lineGrad.addColorStop(0,'rgba('+acc2+',0)'); lineGrad.addColorStop(0.5,'rgba('+acc2+',0.35)'); lineGrad.addColorStop(1,'rgba('+acc2+',0)');
                    actx.fillStyle = lineGrad; actx.fillRect(0,predatorScanY-15,ac.width,30);
                    actx.strokeStyle='rgba('+acc2+',0.5)'; actx.lineWidth=1;
                    actx.beginPath(); actx.moveTo(0,predatorScanY); actx.lineTo(ac.width,predatorScanY); actx.stroke();
                    const rcx=ac.width-46, rcy=64, rr=34;
                    actx.save();
                    actx.strokeStyle='rgba('+acc2+',0.4)'; actx.lineWidth=1;
                    actx.beginPath(); actx.arc(rcx,rcy,rr,0,Math.PI*2); actx.stroke();
                    actx.beginPath(); actx.arc(rcx,rcy,rr*0.6,0,Math.PI*2); actx.stroke();
                    actx.beginPath(); actx.moveTo(rcx-rr,rcy); actx.lineTo(rcx+rr,rcy); actx.stroke();
                    actx.beginPath(); actx.moveTo(rcx,rcy-rr); actx.lineTo(rcx,rcy+rr); actx.stroke();
                    predatorRadarAngle += 0.05;
                    const sweepGrad = actx.createLinearGradient(rcx,rcy,rcx+Math.cos(predatorRadarAngle)*rr,rcy+Math.sin(predatorRadarAngle)*rr);
                    sweepGrad.addColorStop(0,'rgba('+acc2+',0.6)'); sweepGrad.addColorStop(1,'rgba('+acc2+',0)');
                    actx.strokeStyle = sweepGrad; actx.lineWidth=2;
                    actx.beginPath(); actx.moveTo(rcx,rcy); actx.lineTo(rcx+Math.cos(predatorRadarAngle)*rr,rcy+Math.sin(predatorRadarAngle)*rr); actx.stroke();
                    predatorBlips.forEach(b => {
                        const bx=rcx+Math.cos(b.a)*rr*b.r, by=rcy+Math.sin(b.a)*rr*b.r;
                        const diff = Math.abs(((predatorRadarAngle%(Math.PI*2))-b.a+Math.PI*3)%(Math.PI*2)-Math.PI);
                        const blipAlpha = diff<0.5 ? 1-diff/0.5 : 0;
                        if (blipAlpha>0) { actx.fillStyle='rgba('+acc2+','+blipAlpha+')'; actx.beginPath(); actx.arc(bx,by,2,0,Math.PI*2); actx.fill(); }
                    });
                    actx.restore();
                    if (Math.random()>0.992 && !predatorReticle) predatorReticle = { x:40+Math.random()*(ac.width-80), y:90+Math.random()*(ac.height-220), life:1 };
                    if (predatorReticle) {
                        predatorReticle.life -= 0.012;
                        if (predatorReticle.life<=0) predatorReticle=null;
                        else {
                            const a = Math.min(predatorReticle.life>0.85?(1-predatorReticle.life)/0.15:1,1) * Math.min(predatorReticle.life/0.15,1);
                            const size = 22+(1-Math.min(predatorReticle.life,1))*6;
                            actx.save(); actx.globalAlpha=a; actx.strokeStyle=cssColor('--accent'); actx.lineWidth=1.3;
                            actx.beginPath(); actx.arc(predatorReticle.x,predatorReticle.y,size,0,Math.PI*2); actx.stroke();
                            actx.beginPath(); actx.moveTo(predatorReticle.x-size-6,predatorReticle.y); actx.lineTo(predatorReticle.x-size+4,predatorReticle.y); actx.stroke();
                            actx.beginPath(); actx.moveTo(predatorReticle.x+size-4,predatorReticle.y); actx.lineTo(predatorReticle.x+size+6,predatorReticle.y); actx.stroke();
                            actx.beginPath(); actx.moveTo(predatorReticle.x,predatorReticle.y-size-6); actx.lineTo(predatorReticle.x,predatorReticle.y-size+4); actx.stroke();
                            actx.beginPath(); actx.moveTo(predatorReticle.x,predatorReticle.y+size-4); actx.lineTo(predatorReticle.x,predatorReticle.y+size+6); actx.stroke();
                            actx.font='8px monospace'; actx.fillStyle=cssColor('--accent'); actx.fillText('LOCKED', predatorReticle.x-16, predatorReticle.y+size+14);
                            actx.restore();
                        }
                    }
                }
                function drawMK() {
                    const phoneEl = document.querySelector('.phone');
                    if (Math.random()>0.4) mkEmbers.push({ x:Math.random()*ac.width, y:ac.height+10, vx:(Math.random()-0.5)*0.6, vy:-0.6-Math.random()*1.2, size:1+Math.random()*2, life:1, decay:0.004+Math.random()*0.006, color: Math.random()>0.5?cssColor('--accent'):cssColor('--accent-2') });
                    mkEmbers.forEach(e => {
                        e.x+=e.vx; e.y+=e.vy; e.life-=e.decay;
                        const fade=Math.max(e.life,0); actx.globalAlpha=fade; actx.fillStyle=e.color; actx.shadowBlur=6; actx.shadowColor=e.color;
                        actx.beginPath(); actx.arc(e.x,e.y,e.size,0,Math.PI*2); actx.fill();
                    });
                    actx.globalAlpha=1; actx.shadowBlur=0;
                    mkEmbers = mkEmbers.filter(e=>e.life>0 && e.y>-10);
                    if (Math.random()>0.96) mkDrips.push({ x:20+Math.random()*(ac.width-40), y:-10, len:8+Math.random()*10, speed:1.2+Math.random()*1.5, life:1 });
                    mkDrips.forEach(d => {
                        d.y+=d.speed; d.life-=0.004;
                        const fade=Math.max(d.life,0); actx.globalAlpha=fade;
                        const grad = actx.createLinearGradient(d.x,d.y-d.len,d.x,d.y);
                        grad.addColorStop(0,'rgba(0,0,0,0)'); grad.addColorStop(1,cssColor('--accent'));
                        actx.strokeStyle=grad; actx.lineWidth=2;
                        actx.beginPath(); actx.moveTo(d.x,d.y-d.len); actx.lineTo(d.x,d.y); actx.stroke();
                        actx.fillStyle=cssColor('--accent'); actx.beginPath(); actx.arc(d.x,d.y,1.4,0,Math.PI*2); actx.fill();
                    });
                    actx.globalAlpha=1;
                    mkDrips = mkDrips.filter(d=>d.life>0 && d.y<ac.height+10);
                    if (Date.now()-lastTrigger>6000 && Math.random()>0.5) {
                        lastTrigger = Date.now(); mkFlash=1;
                        const startX = 30+Math.random()*(ac.width-60);
                        const points=[{x:startX,y:-5}]; let x=startX;
                        for (let i=1;i<=9;i++) { const y=(ac.height/9)*i; x+=(Math.random()-0.5)*50; x=Math.max(10,Math.min(ac.width-10,x)); points.push({x,y}); }
                        mkBolt = { points, life:1 };
                        if (phoneEl) { phoneEl.classList.add('mk-shake'); setTimeout(()=>phoneEl.classList.remove('mk-shake'),280); }
                    }
                    if (mkBolt) {
                        mkBolt.life -= 0.05;
                        if (mkBolt.life<=0) mkBolt=null;
                        else {
                            actx.save(); actx.globalAlpha=Math.min(mkBolt.life*2,1);
                            actx.strokeStyle='#7CD9FF'; actx.shadowBlur=14; actx.shadowColor='#3AB8FF'; actx.lineWidth=2;
                            actx.beginPath(); mkBolt.points.forEach((p,i)=>{i===0?actx.moveTo(p.x,p.y):actx.lineTo(p.x,p.y);}); actx.stroke();
                            actx.strokeStyle='#FFFFFF'; actx.lineWidth=0.8; actx.shadowBlur=4;
                            actx.beginPath(); mkBolt.points.forEach((p,i)=>{i===0?actx.moveTo(p.x,p.y):actx.lineTo(p.x,p.y);}); actx.stroke();
                            actx.restore();
                        }
                    }
                    if (mkFlash>0) { actx.fillStyle='rgba(124,217,255,'+(mkFlash*0.16)+')'; actx.fillRect(0,0,ac.width,ac.height); mkFlash -= 0.08; }
                }
                function drawMatrix() {
                    if (!matrixDrops) { matrixColumns = Math.floor(ac.width/13); matrixDrops = Array(matrixColumns).fill(0).map(()=>Math.random()*-30); }
                    actx.fillStyle='rgba(0,0,0,0.08)'; actx.fillRect(0,0,ac.width,ac.height); actx.font='13px monospace';
                    for (let i=0;i<matrixColumns;i++) {
                        const text = matrixChars[Math.floor(Math.random()*matrixChars.length)];
                        const y = matrixDrops[i]*13;
                        const isHead = Math.random()>0.92;
                        actx.fillStyle = isHead ? '#cfffd9' : 'rgba('+cssColorRgb('--accent-rgb')+',0.55)';
                        actx.fillText(text, i*13, y);
                        if (y>ac.height && Math.random()>0.975) matrixDrops[i]=0;
                        matrixDrops[i]++;
                    }
                }
                function loop() {
                    const theme = currentTheme();
                    if (theme !== lastTheme) {
                        actx.clearRect(0,0,ac.width,ac.height);
                        tronPulses=[]; mkEmbers=[]; mkDrips=[]; mkBolt=null; matrixDrops=null; predatorReticle=null;
                        lastTheme = theme;
                    }
                    if (theme !== 'matrix') actx.clearRect(0,0,ac.width,ac.height);
                    drawFullScreenWash();
                    if (theme==='tron') drawTron();
                    else if (theme==='predator') drawPredator();
                    else if (theme==='mk') drawMK();
                    else if (theme==='matrix') drawMatrix();
                    requestAnimationFrame(loop);
                }
                loop();
            }        };
    }

    FocusCore.applyStoredTheme();
    FocusCore.initAtmosphere('atmosCanvas');

    function toast(msg){
        const t=document.getElementById('toast');
        t.innerText=msg; t.classList.add('show');
        clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'), 2200);
    }
    function escapeHtml(s){ const d=document.createElement('div'); d.innerText=String(s==null?'':s); return d.innerHTML; }

    const CATEGORIES = [
        { id:'tarot', label:'Таролог' },
        { id:'astrology', label:'Астролог' },
        { id:'numerology', label:'Нумеролог' },
        { id:'runes', label:'Рунолог' },
        { id:'palmistry', label:'Хиромант' },
        { id:'clairvoyant', label:'Ясновидящий' },
        { id:'shaman', label:'Шаман' },
        { id:'lead_pour', label:'Отлив воском' }
    ];

    const APPS_KEY = 'focus_psychic_applications';
    function getApps(){ try { return JSON.parse(localStorage.getItem(APPS_KEY)) || []; } catch(e){ return []; } }
    function saveApps(a){ localStorage.setItem(APPS_KEY, JSON.stringify(a)); }

    // моя заявка (по email текущего юзера)
    function myApplication(){
        const u = FocusStorage.getUser();
        const email = u.email || localStorage.getItem('focus_user_email') || '';
        const apps = getApps();
        // последняя заявка этого юзера
        return apps.filter(a => a.email === email).sort((x,y)=>y.id-x.id)[0] || null;
    }

    let selectedCats = [];

    function render(){
        const area = document.getElementById('scrollArea');
        const app = myApplication();

        if (app && app.status === 'approved') {
            area.innerHTML = `
                <div class="approved-box">
                    <div class="big">✨</div>
                    <div class="pending-title" style="color:#78DC96;">Заявка одобрена!</div>
                    <div class="pending-sub">Поздравляем! Теперь ты — Оракул FOCUS. Открой кабинет, чтобы настроить услуги и принимать заявки.</div>
                </div>
                <div class="cabinet-btn" onclick="location.href='psychic_dashboard.html'">Открыть кабинет Оракула →</div>`;
            return;
        }
        if (app && app.status === 'pending') {
            area.innerHTML = `
                <div class="pending-box">
                    <div class="big">⏳</div>
                    <div class="pending-title">Заявка на рассмотрении</div>
                    <div class="pending-sub">Твоя заявка отправлена администратору. Обычно проверка занимает 1–2 дня. Мы сообщим о решении.</div>
                </div>
                <div class="apply-note">Заявка подана: ${new Date(app.createdAt).toLocaleDateString('ru-RU')}<br>Категории: ${app.categories.map(id=>{const c=CATEGORIES.find(x=>x.id===id);return c?c.label:id;}).join(', ')}</div>`;
            return;
        }
        if (app && app.status === 'rejected') {
            area.innerHTML = `
                <div class="pending-box" style="background:rgba(255,120,120,0.1);border-color:rgba(255,120,120,0.3);">
                    <div class="big">😔</div>
                    <div class="pending-title" style="color:#FF8A7C;">Заявка отклонена</div>
                    <div class="pending-sub">К сожалению, заявка не одобрена. Ты можешь подать новую с более подробным описанием опыта.</div>
                </div>
                <div class="submit-btn" id="retryBtn" style="margin-top:14px;">Подать новую заявку</div>`;
            document.getElementById('retryBtn').addEventListener('click', () => { showForm(); });
            return;
        }
        showForm();
    }

    function showForm(){
        const area = document.getElementById('scrollArea');
        selectedCats = [];
        area.innerHTML = `
            <div class="apply-intro">
                <div class="apply-intro-title">🔮 Стань Оракулом FOCUS</div>
                <div class="apply-intro-sub">Оказывай услуги (таро, астрология, руны и др.), назначай свои цены и зарабатывай монеты. После одобрения админом откроется кабинет Оракула.</div>
            </div>
            <div class="field">
                <label class="field-label">ТВОЁ ИМЯ / ПСЕВДОНИМ</label>
                <input type="text" class="field-input" id="apName" placeholder="Как тебя представить клиентам">
            </div>
            <div class="field">
                <label class="field-label">КАТЕГОРИИ УСЛУГ (до 3)</label>
                <div class="cat-grid" id="catGrid"></div>
                <div class="cat-warn" id="catWarn"></div>
            </div>
            <div class="field">
                <label class="field-label">ОПЫТ И ПРАКТИКА</label>
                <textarea class="field-input" id="apExp" placeholder="Сколько лет практики, какие методы используешь, чем можешь помочь людям..."></textarea>
            </div>
            <div class="field">
                <label class="field-label">КОНТАКТ ДЛЯ СВЯЗИ</label>
                <input type="text" class="field-input" id="apContact" placeholder="Telegram / WhatsApp / телефон">
            </div>
            <div class="submit-btn" id="submitBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg>
                Отправить заявку
            </div>
            <div class="apply-note">Отправляя заявку, ты соглашаешься с правилами площадки. FOCUS удерживает комиссию с каждой выполненной услуги.</div>`;

        const grid = document.getElementById('catGrid');
        CATEGORIES.forEach(cat => {
            const chip = document.createElement('div');
            chip.className = 'cat-check';
            chip.innerText = cat.label;
            chip.addEventListener('click', () => {
                const i = selectedCats.indexOf(cat.id);
                if (i >= 0) { selectedCats.splice(i,1); chip.classList.remove('on'); }
                else {
                    if (selectedCats.length >= 3) { document.getElementById('catWarn').innerText = 'Максимум 3 категории'; return; }
                    selectedCats.push(cat.id); chip.classList.add('on');
                    document.getElementById('catWarn').innerText = '';
                }
            });
            grid.appendChild(chip);
        });

        document.getElementById('submitBtn').addEventListener('click', submitApplication);
    }

    function submitApplication(){
        const name = document.getElementById('apName').value.trim();
        const exp = document.getElementById('apExp').value.trim();
        const contact = document.getElementById('apContact').value.trim();
        if (!name) { toast('Введи имя или псевдоним'); return; }
        if (selectedCats.length === 0) { toast('Выбери хотя бы одну категорию'); return; }
        if (!exp) { toast('Опиши свой опыт'); return; }
        if (!contact) { toast('Укажи контакт для связи'); return; }

        const u = FocusStorage.getUser();
        const email = u.email || localStorage.getItem('focus_user_email') || ('user_' + Date.now());
        const application = {
            id: Date.now(),
            email: email,
            name: name,
            categories: selectedCats.slice(),
            experience: exp,
            contacts: contact,
            status: 'pending',
            createdAt: new Date().toISOString()
        };
        const apps = getApps();
        apps.push(application);
        saveApps(apps);
        toast('✓ Заявка отправлена! Ожидай одобрения');
        setTimeout(render, 1000);
    }

    render();

</script>
<script>
    if ("serviceWorker" in navigator) { window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
    <script src="focus-chat-fab.js"></script>
