<!DOCTYPE html>
<html lang="ru" data-theme="original" id="htmlRoot">
<head>
<style>html,body{background:#0a0a0f;margin:0;}</style>
<script>try{var _t=localStorage.getItem('focus_theme')||'original';document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FOCUS">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Чаты — FOCUS</title>
<style>
    :root, [data-theme="original"] { --accent:#FFD966; --accent-rgb:255,217,102; --accent-2:#7C8CFF; --accent-2-rgb:124,140,255; --accent-light:#FFE9A8; --accent-dark:#C9952E; --bg-1:#131319; --bg-2:#0d0d12; --text-strong:#FFFFFF; }
    [data-theme="tron"] { --accent:#FF3B2E; --accent-rgb:255,59,46; --accent-2:#00E5FF; --accent-2-rgb:0,229,255; --accent-light:#FF8A6B; --accent-dark:#B8201A; --bg-1:#0a0a0d; --bg-2:#000000; --text-strong:#FFFFFF; }
    [data-theme="predator"] { --accent:#FF7A1A; --accent-rgb:255,122,26; --accent-2:#39FF6A; --accent-2-rgb:57,255,106; --accent-light:#FFB347; --accent-dark:#B84D00; --bg-1:#0d120d; --bg-2:#050705; --text-strong:#FFFFFF; }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
        background:var(--bg-2); color:#fff; height:100vh; overflow:hidden;
        display:flex; flex-direction:column;
        padding-top:env(safe-area-inset-top,0px); }

    /* ── ШАПКА ── */
    .top { flex:0 0 auto; padding:12px 14px 8px; }
    .top-row { display:flex; align-items:center; gap:12px; }
    .top-title { font-size:24px; font-weight:800; color:#fff; flex:1; letter-spacing:-0.5px; }
    .top-btn { width:38px; height:38px; border-radius:50%; flex:0 0 auto;
        display:flex; align-items:center; justify-content:center; cursor:pointer;
        background:rgba(var(--accent-rgb),0.1); border:1px solid rgba(var(--accent-rgb),0.22); }
    .top-btn svg { width:19px; height:19px; color:var(--accent); }
    .top-btn.solid { background:linear-gradient(135deg, var(--accent), var(--accent-2)); border:none; }
    .top-btn.solid svg { color:#0a0a0f; }

    /* ── ПОИСК ── */
    .search-box { margin-top:11px; position:relative; }
    .search-box input { width:100%; padding:11px 14px 11px 40px; border-radius:13px;
        background:var(--bg-1); border:1px solid rgba(255,255,255,0.07); color:#fff;
        font-size:14.5px; outline:none; }
    .search-box input:focus { border-color:rgba(var(--accent-rgb),0.4); }
    .search-box svg { position:absolute; left:13px; top:50%; transform:translateY(-50%);
        width:17px; height:17px; color:#6e6e7e; }

    /* ── ВКЛАДКИ ── */
    .tabs { display:flex; gap:8px; margin-top:11px; }
    .tab { padding:7px 15px; border-radius:20px; font-size:13px; font-weight:600;
        color:#8e8e9e; cursor:pointer; background:var(--bg-1); white-space:nowrap;
        transition:0.15s; display:flex; align-items:center; gap:6px; }
    .tab.active { background:linear-gradient(135deg, rgba(var(--accent-rgb),0.9), rgba(var(--accent-2-rgb),0.85));
        color:#0a0a0f; }
    .tab-badge { background:rgba(0,0,0,0.25); border-radius:9px; padding:1px 6px; font-size:11px; }
    .tab:not(.active) .tab-badge { background:var(--accent); color:#0a0a0f; }

    /* ── СПИСОК ── */
    .list { flex:1 1 auto; overflow-y:auto; overflow-x:hidden; padding:6px 0 90px;
        -webkit-overflow-scrolling:touch; }
    .list::-webkit-scrollbar { width:0; }

    .chat-row { display:flex; align-items:center; gap:12px; padding:10px 14px; cursor:pointer;
        position:relative; transition:background 0.12s; }
    .chat-row:active { background:rgba(255,255,255,0.04); }

    /* АВАТАР — строго круглый, фиксированный, единый для всего FOCUS */
    .av { flex:0 0 52px; width:52px; height:52px; border-radius:50%; overflow:hidden;
        position:relative; display:flex; align-items:center; justify-content:center;
        font-weight:700; font-size:20px; color:#0a0a0f; }
    .av img { width:100%; height:100%; object-fit:cover; display:block; }
    .av-letter { width:100%; height:100%; display:flex; align-items:center; justify-content:center;
        background:linear-gradient(135deg, var(--accent), var(--accent-2)); }
    /* точка "в сети" */
    .av .dot { position:absolute; bottom:1px; right:1px; width:14px; height:14px;
        border-radius:50%; background:#5ecf9a; border:2.5px solid var(--bg-2); display:none; }
    .av.online .dot { display:block; }

    .chat-mid { flex:1 1 auto; min-width:0; }
    .chat-top { display:flex; align-items:center; gap:8px; }
    .chat-name { font-size:15.5px; font-weight:600; color:#fff; flex:1; min-width:0;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .chat-time { font-size:12px; color:#6e6e7e; flex:0 0 auto; }
    .chat-bot { display:flex; align-items:center; gap:8px; margin-top:3px; }
    .chat-last { font-size:13.5px; color:#8e8e9e; flex:1; min-width:0;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .chat-badge { flex:0 0 auto; min-width:20px; height:20px; padding:0 6px; border-radius:11px;
        background:var(--accent); color:#0a0a0f; font-size:12px; font-weight:700;
        display:flex; align-items:center; justify-content:center; }
    .chat-pin { flex:0 0 auto; }
    .chat-pin svg { width:13px; height:13px; color:#6e6e7e; }

    .group-tag { font-size:10px; color:var(--accent); background:rgba(var(--accent-rgb),0.12);
        padding:1px 6px; border-radius:6px; flex:0 0 auto; }

    /* ── ПУСТО ── */
    .empty { text-align:center; padding:70px 30px; color:#6e6e7e; }
    .empty-ic { font-size:44px; margin-bottom:14px; opacity:0.5; }
    .empty-t { font-size:15px; margin-bottom:6px; color:#8e8e9e; }
    .empty-s { font-size:13px; }

    /* ── СКЕЛЕТОН (пока грузится) ── */
    .skel { display:flex; align-items:center; gap:12px; padding:10px 14px; }
    .skel-av { width:52px; height:52px; border-radius:50%; flex:0 0 52px; }
    .skel-l { flex:1; }
    .skel-l1 { height:13px; width:45%; border-radius:6px; margin-bottom:8px; }
    .skel-l2 { height:11px; width:70%; border-radius:6px; }
    .skel-av, .skel-l1, .skel-l2 { background:linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
        background-size:200% 100%; animation:sh 1.3s infinite; }
    @keyframes sh { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

    /* ── НИЖНЯЯ НАВИГАЦИЯ ── */
    .nav { position:fixed; bottom:0; left:0; right:0; display:flex;
        background:rgba(13,13,18,0.96); backdrop-filter:blur(16px);
        border-top:1px solid rgba(255,255,255,0.06);
        padding-bottom:env(safe-area-inset-bottom,0px); z-index:50; }
    .nav-item { flex:1; padding:9px 0 8px; display:flex; flex-direction:column; align-items:center;
        gap:3px; cursor:pointer; color:#6e6e7e; }
    .nav-item.active { color:var(--accent); }
    .nav-item svg { width:23px; height:23px; }
    .nav-item span { font-size:10.5px; font-weight:500; }

    /* ── FAB ── */
    .fab { position:fixed; right:18px; bottom:calc(76px + env(safe-area-inset-bottom,0px));
        width:56px; height:56px; border-radius:50%; z-index:55;
        background:linear-gradient(135deg, var(--accent), var(--accent-2));
        display:flex; align-items:center; justify-content:center; cursor:pointer;
        box-shadow:0 6px 20px rgba(var(--accent-rgb),0.4); }
    .fab svg { width:26px; height:26px; color:#0a0a0f; }

    /* ── МОДАЛКИ ── */
    .modal { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.6);
        backdrop-filter:blur(4px); display:none; align-items:flex-end; }
    .modal.show { display:flex; }
    .sheet { width:100%; background:var(--bg-1); border-radius:22px 22px 0 0; padding:20px 18px;
        padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));
        max-height:88vh; overflow-y:auto; animation:up 0.25s ease; }
    @keyframes up { from{transform:translateY(100%);} to{transform:translateY(0);} }
    .sheet-grip { width:38px; height:4px; border-radius:2px; background:rgba(255,255,255,0.18);
        margin:0 auto 16px; }
    .sheet-title { font-size:18px; font-weight:700; margin-bottom:5px; }
    .sheet-sub { font-size:13px; color:#8e8e9e; margin-bottom:16px; }
    .sheet-input { width:100%; padding:13px 15px; border-radius:13px; background:var(--bg-2);
        border:1px solid rgba(255,255,255,0.08); color:#fff; font-size:15px; outline:none;
        margin-bottom:12px; }
    .sheet-input:focus { border-color:rgba(var(--accent-rgb),0.4); }
    .btn { width:100%; padding:14px; border:none; border-radius:14px; font-size:15px; font-weight:700;
        cursor:pointer; background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#0a0a0f; }
    .btn:disabled { opacity:0.5; }
    .btn-sec { background:var(--bg-2); color:#fff; border:1px solid rgba(255,255,255,0.1); margin-top:9px; }

    /* строка результата поиска / контакта */
    .res-row { display:flex; align-items:center; gap:12px; padding:11px 4px; }
    .res-mid { flex:1; min-width:0; }
    .res-name { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .res-phone { font-size:12px; color:#8e8e9e; }
    .res-btn { flex:0 0 auto; padding:8px 14px; border-radius:11px; font-size:12.5px; font-weight:700;
        cursor:pointer; white-space:nowrap; background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#0a0a0f; border:none; }
    .res-btn.add { width:34px; height:34px; padding:0; display:flex; align-items:center; justify-content:center;
        font-size:19px; background:rgba(var(--accent-rgb),0.14); color:var(--accent);
        border:1px solid rgba(var(--accent-rgb),0.3); }
    .res-btn.added { background:rgba(94,207,154,0.15); color:#5ecf9a; border-color:rgba(94,207,154,0.4); }

    /* меню действий над диалогом */
    .menu-item { display:flex; align-items:center; gap:12px; padding:14px 6px; cursor:pointer;
        font-size:15px; border-bottom:1px solid rgba(255,255,255,0.05); }
    .menu-item:last-child { border-bottom:none; }
    .menu-item svg { width:19px; height:19px; color:#8e8e9e; }
    .menu-item.danger { color:#ff6b6b; }
    .menu-item.danger svg { color:#ff6b6b; }

    /* чек-лист участников группы */
    .mem-row { display:flex; align-items:center; gap:11px; padding:9px 4px; cursor:pointer; }
    .mem-check { width:22px; height:22px; border-radius:50%; border:2px solid rgba(255,255,255,0.2);
        flex:0 0 auto; display:flex; align-items:center; justify-content:center; }
    .mem-row.sel .mem-check { background:var(--accent); border-color:var(--accent); }
    .mem-row.sel .mem-check svg { width:12px; height:12px; color:#0a0a0f; }

    .toast { position:fixed; bottom:calc(90px + env(safe-area-inset-bottom,0px)); left:50%;
        transform:translateX(-50%); background:rgba(20,20,28,0.97); color:#fff;
        padding:11px 20px; border-radius:12px; font-size:13.5px; z-index:500;
        border:1px solid rgba(var(--accent-rgb),0.25); opacity:0; transition:0.25s; pointer-events:none;
        max-width:82%; text-align:center; }
    .toast.show { opacity:1; }
</style>
</head>
<body>

<div class="top">
    <div class="top-row">
        <div class="top-title" id="topTitle">Чаты</div>
        <div class="top-btn" id="searchToggle" title="Поиск">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <div class="top-btn solid" id="newBtn" title="Найти человека">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </div>
    </div>
    <div class="search-box" id="searchWrap" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Поиск: чаты, сообщения, файлы" autocomplete="off">
    </div>
    <div class="tabs" id="tabs">
        <div class="tab active" data-tab="all">Все</div>
        <div class="tab" data-tab="unread">Новые <span class="tab-badge" id="unreadBadge" style="display:none;">0</span></div>
        <div class="tab" data-tab="groups">Группы</div>
    </div>
</div>

<div class="list" id="list">
    <div class="skel"><div class="skel-av"></div><div class="skel-l"><div class="skel-l1"></div><div class="skel-l2"></div></div></div>
    <div class="skel"><div class="skel-av"></div><div class="skel-l"><div class="skel-l1"></div><div class="skel-l2"></div></div></div>
    <div class="skel"><div class="skel-av"></div><div class="skel-l"><div class="skel-l1"></div><div class="skel-l2"></div></div></div>
</div>

<div class="fab" id="fab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
</div>

<div class="nav">
    <div class="nav-item active" data-nav="chats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Чаты</span>
    </div>
    <div class="nav-item" data-nav="contacts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Контакты</span>
    </div>
    <div class="nav-item" data-nav="home" onclick="location.href='index.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Главная</span>
    </div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="focus-storage.js"></script>
<script src="focus-ai.js"></script>
<script type="module" src="firebase-auth-helper.js"></script>
<script src="focus-chats-logic.js"></script>
</body>
</html>
